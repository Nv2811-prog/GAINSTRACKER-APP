<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#070809"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>GainsTracker — Gotham Iron Protocol</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet"/>
<style>
:root{
--bg:#0b0e15;--bg2:#151a25;--bg3:#1a2030;--bg4:#222937;
--gold:#C9A84C;--gold2:#EBC76B;--gold3:#F7DD93;--gold-dim:#8B6B2A;--gold-bg:#1A1305;
--red:#F0524A;--green:#34D27B;--yellow:#E8C53C;--orange:#E8923C;--blue:#4F93E8;--purple:#9C5CE8;--steel:#5B7CA6;
--text:#F3EFE3;--text2:#97a0ad;--text3:#5b626e;
--border:#23262e;--border2:#363b46;
--disp:'Bebas Neue','Oswald','Arial Narrow',sans-serif;
--body:'DM Sans','Segoe UI',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.45;
overflow-x:hidden;-webkit-font-smoothing:antialiased;
background-image:radial-gradient(circle at 50% -8%,rgba(235,199,107,.17),transparent 46%),radial-gradient(circle at 50% 2%,rgba(91,124,166,.15),transparent 58%),radial-gradient(circle at 86% 112%,rgba(124,92,232,.09),transparent 50%),radial-gradient(circle at 10% 120%,rgba(91,124,166,.08),transparent 48%);background-attachment:fixed;}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
background-image:linear-gradient(rgba(91,124,166,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(91,124,166,.045) 1px,transparent 1px);background-size:36px 36px;
-webkit-mask-image:radial-gradient(circle at 50% 24%,#000,transparent 76%);mask-image:radial-gradient(circle at 50% 24%,#000,transparent 76%);}
#app{max-width:560px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 14px 96px;min-height:100%}
h1,h2,h3,.disp{font-family:var(--disp);font-weight:400;letter-spacing:.04em;line-height:.98}
.num{font-family:var(--disp);letter-spacing:.02em}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit;font-size:15px}
input,select,textarea{font-family:var(--body);font-size:16px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:11px 12px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold-dim)}
.lbl{display:block;font-family:var(--disp);font-size:12px;letter-spacing:.06em;color:var(--gold2);margin-bottom:3px}
img{display:block;max-width:100%}
.muted{color:var(--text2)}.dim{color:var(--text3)}
.gold{color:var(--gold2)}.red{color:var(--red)}.green{color:var(--green)}.blue{color:var(--blue)}
.center{text-align:center}.row{display:flex;align-items:center;gap:10px}.wrap{flex-wrap:wrap}
.sp{justify-content:space-between}.g{flex:1}
.hide{display:none!important}
.tag{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:700}

/* cards — frosted glass */
.card{background:linear-gradient(180deg,rgba(37,43,58,.92),rgba(20,24,34,.82));backdrop-filter:blur(10px) saturate(1.3);-webkit-backdrop-filter:blur(10px) saturate(1.3);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:15px;margin-bottom:13px;position:relative;overflow:hidden;content-visibility:auto;contain-intrinsic-size:auto 160px;
box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 0 0 1px rgba(255,255,255,.025),0 20px 46px -22px rgba(0,0,0,.9),0 2px 10px -4px rgba(0,0,0,.55)}
.card::before{content:"";position:absolute;left:14px;right:14px;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(235,199,107,.24),transparent);pointer-events:none}
.card::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 38%)}
.card.glow{border-color:rgba(201,168,76,.35);box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 0 0 1px rgba(201,168,76,.2),0 18px 48px -18px rgba(201,168,76,.36)}
.card.glow::before{background:linear-gradient(90deg,transparent,rgba(247,221,147,.6),transparent);height:1px}
/* glow-pop: lifts any element off the dark so you can see it's there */
.pop{box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 0 0 1px rgba(201,168,76,.16),0 8px 26px -10px rgba(201,168,76,.26),0 22px 52px -26px rgba(0,0,0,.9)!important}
.pop-red{box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 0 0 1px rgba(240,82,74,.22),0 10px 30px -10px rgba(240,82,74,.3)!important}
.pop-green{box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 0 0 1px rgba(52,210,123,.22),0 10px 30px -10px rgba(52,210,123,.28)!important}
/* figure stage: a lit pedestal so the Batsuit pops off the black */
.stage{position:relative;background:radial-gradient(ellipse 70% 60% at 50% 34%,#2a2f3c 0%,#13161f 55%,#070809 100%)!important;border:1px solid rgba(201,168,76,.22)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),inset 0 0 60px -20px rgba(124,150,255,.18),0 0 0 1px rgba(201,168,76,.1),0 18px 50px -24px rgba(0,0,0,.9)!important}
.stage::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:radial-gradient(ellipse 60% 42% at 50% 96%,rgba(201,168,76,.12),transparent 70%)}
.card h2,.card h3{color:var(--gold2)}
.ttl{font-family:var(--disp);font-size:13px;letter-spacing:.17em;text-transform:uppercase;color:var(--gold2);opacity:.82;margin-bottom:10px}
.big{font-family:var(--disp);font-size:46px;color:var(--gold2);line-height:.9;text-shadow:0 0 22px rgba(235,199,107,.2)}
.hr{height:1px;background:var(--border);margin:13px 0}

/* buttons — frosted glass */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 16px;border-radius:13px;position:relative;overflow:hidden;
background:linear-gradient(180deg,rgba(42,48,60,.55),rgba(20,24,32,.42));backdrop-filter:blur(12px) saturate(1.3);-webkit-backdrop-filter:blur(12px) saturate(1.3);border:1px solid rgba(255,255,255,.13);color:var(--text);font-weight:600;width:100%;transition:transform .12s,filter .12s,box-shadow .12s;box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 6px 16px -10px rgba(0,0,0,.7)}
.btn:active{transform:scale(.97);filter:brightness(1.12)}
.btn.gold{background:linear-gradient(180deg,var(--gold3),var(--gold));backdrop-filter:none;-webkit-backdrop-filter:none;color:#150f02;border:none;font-weight:700;letter-spacing:.03em;box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 8px 22px -10px rgba(235,199,107,.65)}
.btn.gold:active{filter:brightness(1.08)}
.btn.ghost{background:rgba(255,255,255,.03);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);box-shadow:none;border-color:rgba(255,255,255,.08)}
.btn.sm{padding:8px 12px;font-size:13px;width:auto}
.btn.danger{color:var(--red);border-color:rgba(232,82,74,.32);background:linear-gradient(180deg,rgba(40,20,21,.55),rgba(20,12,13,.42))}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:20px;position:relative;overflow:hidden;background:linear-gradient(180deg,rgba(38,42,54,.5),rgba(20,24,32,.4));backdrop-filter:blur(10px) saturate(1.2);-webkit-backdrop-filter:blur(10px) saturate(1.2);border:1px solid rgba(255,255,255,.1);font-size:13px;font-weight:600;width:auto;flex:none;white-space:nowrap;transition:transform .12s,filter .12s}
.chip:active{transform:scale(.95)}
.chip.on{background:linear-gradient(180deg,rgba(36,26,6,.7),rgba(25,18,5,.6));border-color:rgba(201,168,76,.5);color:var(--gold2);box-shadow:0 0 16px -4px rgba(235,199,107,.45)}
/* press ripple */
.ripple{position:absolute;border-radius:50%;transform:scale(0);pointer-events:none;background:radial-gradient(circle,rgba(247,221,147,.55),rgba(247,221,147,0) 70%);animation:rippleAnim .6s ease-out forwards;mix-blend-mode:screen}
@keyframes rippleAnim{to{transform:scale(2.6);opacity:0}}
.exrow,.sdone,#nav button,.stype{position:relative;overflow:hidden}
/* global tactile polish — every tappable card now reacts to a press */
button.card,.card[onclick]{transition:transform .12s ease,box-shadow .15s ease,border-color .15s ease}
button.card:active,.card[onclick]:active{transform:scale(.984)}
@media(hover:hover){button.card:hover,.card[onclick]:hover{border-color:rgba(201,168,76,.34)}}
/* premium static sheen across primary gold CTAs */
.btn.gold::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;background:linear-gradient(118deg,rgba(255,255,255,.5) 0%,rgba(255,255,255,0) 26%,rgba(255,255,255,0) 70%,rgba(255,255,255,.16) 100%);mix-blend-mode:overlay}

/* nav */
#nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(8,9,12,.9);backdrop-filter:blur(16px) saturate(1.25);
border-top:1px solid var(--border);display:flex;max-width:560px;margin:0 auto;padding:6px 2px calc(6px + env(safe-area-inset-bottom))}
#nav::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(235,199,107,.3),transparent)}
#nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;color:var(--text3);border-radius:10px;transition:.15s}
#nav button .ic{font-size:18px;filter:grayscale(1) opacity(.5);transition:.15s}
#nav button .lb{font-family:var(--disp);font-size:8.5px;letter-spacing:.02em}
/* Top utility bar (Command Center quick-reach) */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.tbtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:38px;height:34px;padding:0 11px;border:1px solid var(--border);border-radius:11px;background:linear-gradient(160deg,#15151a,#0e0e12);color:var(--text2);font-size:15px;transition:.15s}
.tbtn:active{transform:scale(.95)}
.tbtn.wide{color:var(--gold2);border-color:var(--gold-dim);background:var(--gold-bg)}
.tbtn.on{color:var(--gold2);border-color:var(--gold-dim);background:var(--gold-bg);box-shadow:0 0 0 1px rgba(232,197,106,.18)}
.tbtn .tbl{font-family:var(--disp);font-size:11px;letter-spacing:.06em}
.subtabs{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:5px}
.subtab{flex:1;padding:10px 6px;border:none;border-radius:9px;background:none;color:var(--text2);font-family:var(--disp);font-size:12.5px;letter-spacing:.04em;transition:.15s;cursor:pointer}
.subtab.on{color:var(--gold2);background:var(--gold-bg);box-shadow:inset 0 0 0 1px var(--gold-dim)}
.subtab:active{transform:scale(.97)}
/* Accordion sections — expand/collapse for dense areas */
.accsec{border:1px solid var(--border);border-radius:15px;margin-bottom:12px;overflow:hidden;background:linear-gradient(160deg,#121217,#0d0d11)}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 15px;cursor:pointer;user-select:none}
.acc-head:active{background:rgba(235,199,107,.05)}
.acc-head .acc-ttl{display:flex;align-items:center;gap:9px;font-family:var(--disp);font-size:15px;letter-spacing:.02em;color:var(--gold2)}
.acc-head .acc-sub{font-size:11px;color:var(--text3);font-family:var(--sans);letter-spacing:0}
.acc-arrow{color:var(--text3);font-size:13px;transition:transform .22s ease;display:inline-block}
.acc-arrow.cl{transform:rotate(-90deg)}
.acc-body{padding:0 12px 13px}
.acc-body.hide{display:none}
/* Command Center tiles */
.cc-tile{text-align:left;padding:13px 12px;cursor:pointer;display:flex;flex-direction:column;gap:3px;min-height:74px}
.cc-tile .cc-ic{font-size:22px;line-height:1}
.cc-tile .cc-nm{font-family:var(--disp);font-size:13.5px;color:var(--text);letter-spacing:.01em;margin-top:3px}
.cc-tile .cc-ds{font-size:10.5px;color:var(--text3);line-height:1.3}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
/* Rank ladder */
.rl-row{display:flex;align-items:center;gap:11px;padding:9px 11px;border:1px solid var(--border);border-radius:12px;margin-bottom:7px;background:linear-gradient(160deg,#0f0f13,#0c0c0f)}
.rl-row.cur{border-color:var(--gold-dim);background:var(--gold-bg);box-shadow:0 0 24px rgba(235,199,107,.12)}
.rl-row.done{opacity:.62}
/* Report card grade */
.grade-badge{font-family:var(--disp);font-weight:700;font-size:54px;line-height:1;letter-spacing:-.02em}
/* Tempo dot */
.tempo-dot{width:120px;height:120px;border-radius:50%;margin:18px auto;background:radial-gradient(circle at 50% 40%,rgba(235,199,107,.3),transparent 70%);border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;transition:transform .15s linear,background .15s}
/* Hype countdown */
.hype-num{font-family:var(--disp);font-weight:700;font-size:120px;line-height:1;color:var(--gold2);text-shadow:0 0 40px rgba(235,199,107,.5);animation:hypePulse .9s ease-out}
@keyframes hypePulse{0%{transform:scale(.4);opacity:0}40%{transform:scale(1.1);opacity:1}100%{transform:scale(1);opacity:1}}
/* Bat-Focus breathing orb */
.focus-orb{width:180px;height:180px;border-radius:50%;margin:24px auto;background:radial-gradient(circle at 50% 40%,rgba(235,199,107,.35),rgba(235,199,107,.05) 60%,transparent 72%);border:2px solid rgba(235,199,107,.4);box-shadow:0 0 60px rgba(235,199,107,.25),inset 0 0 50px rgba(235,199,107,.15);animation:focusBreath 16s ease-in-out infinite;display:flex;align-items:center;justify-content:center}
@keyframes focusBreath{0%,100%{transform:scale(.62);box-shadow:0 0 30px rgba(235,199,107,.15),inset 0 0 30px rgba(235,199,107,.1)}25%{transform:scale(1);box-shadow:0 0 80px rgba(235,199,107,.4),inset 0 0 60px rgba(235,199,107,.22)}50%{transform:scale(1)}75%{transform:scale(.62)}}
.focus-phase{font-family:var(--disp);font-size:20px;letter-spacing:.18em;color:var(--gold2);text-shadow:0 0 18px rgba(235,199,107,.5);animation:focusPhase 16s ease-in-out infinite}
@keyframes focusPhase{0%,100%{opacity:.6}25%,50%{opacity:1}}
#nav button.on{color:var(--gold2)}
#nav button.on .ic{filter:none;transform:translateY(-1px);text-shadow:0 0 12px rgba(235,199,107,.5)}

/* exercise thumb */
.exrow{display:flex;gap:13px;align-items:center;padding:13px 12px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(160deg,#0f0f13,#0c0c0f);margin-bottom:9px}
.exrow.added{border-color:rgba(46,204,113,.55);background:linear-gradient(160deg,rgba(46,204,113,.12),rgba(12,12,15,.9))}
/* Workout exercise cards: never virtualize them (stops the screen jumping when you tap a set),
   and block text selection / the iOS copy-callout so holding to drag never grabs text. Inputs stay editable. */
.exdrag{content-visibility:visible;contain-intrinsic-size:auto;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.exdrag input,.exdrag select,.exdrag textarea{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
/* Dedicated drag grip. touch-action:none stops the browser from scroll-stealing the gesture,
   so a finger-drag on the grip reorders immediately instead of "giving up" on first move. */
.draghandle{touch-action:none;cursor:grab;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;color:var(--text3);font-size:19px;font-weight:700;letter-spacing:1px;line-height:1;padding:8px 6px;border-radius:9px;flex:none;transition:background .12s,color .12s}
.draghandle:active,.draghandle.grabbing{cursor:grabbing;background:rgba(232,197,106,.16);color:var(--gold2)}
.exthumb{display:none}
.exthumb-ph{display:none}
.exwrap{display:inline-flex;align-items:center;justify-content:center;width:84px;height:84px;border-radius:14px;background:radial-gradient(circle at 50% 32%,#1d1e25,#08080b 92%);border:1px solid rgba(232,69,60,.3);flex:none;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 3px 10px -5px #000}
.exwrap.sm{width:74px;height:74px;border-radius:12px}
.exwrap svg{pointer-events:none;width:100%;height:100%}
.exwrap img.eximg{width:100%;height:100%;object-fit:contain;display:block;background:#f4f4f4;pointer-events:none}
.exwrap .exfig{display:none;width:100%;height:100%}
.exwrap.noimg img.eximg{display:none}
.exwrap.noimg .exfig{display:block}
.exname{font-weight:700;font-size:15px;line-height:1.2;letter-spacing:-.01em}
.exmeta{font-size:12px;color:var(--text3);margin-top:3px;text-transform:capitalize;letter-spacing:.02em}

/* set table */
.settbl{width:100%;border-collapse:collapse;margin-top:10px}
.settbl th{font-size:10px;letter-spacing:.09em;color:var(--text3);text-transform:uppercase;font-weight:700;padding:5px 3px;text-align:center}
.settbl td{padding:5px 3px;text-align:center}
.settbl input{padding:10px 4px;text-align:center;border-radius:9px;font-size:16px;font-weight:600}
.prevcell{color:var(--text3);font-size:12px;font-variant-numeric:tabular-nums}
.stype{width:36px;height:36px;border-radius:9px;font-family:var(--disp);font-size:15px;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;border:1px solid var(--border2);background:var(--bg4)}
.stype.W{color:var(--yellow);border-color:#5a4d1a;background:#15120000}
.stype.F{color:var(--red);border-color:#4a2420;background:#15080000}
.stype.D{color:var(--orange);border-color:#5a3a1a;background:#150e0000}
.stype.L,.stype.R{color:var(--blue);border-color:#1a3a5a;background:#00102000}
.stype.RP{color:#c89bff;border-color:#3a2a5a;background:rgba(124,92,232,.07);font-size:12px}
.stype.M{color:#5fd0c0;border-color:#1a4a45;background:rgba(46,200,180,.07)}
.sdone{width:36px;height:36px;border-radius:9px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:17px;transition:.1s}
.sdone.on{background:var(--green);border-color:var(--green);color:#04180a;box-shadow:0 0 10px rgba(46,204,113,.25)}

/* timer bars */
.timers{position:sticky;top:0;z-index:20;display:flex;gap:8px;background:rgba(6,6,8,.92);backdrop-filter:blur(14px);padding:10px 2px;margin:-4px -2px 12px}
.tbox{flex:1;text-align:center;border:1px solid var(--border2);border-radius:11px;padding:7px;background:var(--bg2)}
.tbox .num{font-size:26px;color:var(--gold2);display:block}
.tbox.rest .num{color:var(--blue)}
.tbox small{font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase}

/* recovery bars / mev */
.bar{height:7px;border-radius:4px;background:var(--bg4);overflow:hidden;border:1px solid var(--border)}
.bar>i{display:block;height:100%;border-radius:4px;transition:width .5s}
.xpbar{height:11px}
.mini{font-size:11px;color:var(--text3)}

/* overlay / boss / sheet */
#overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:18px}
#overlay.on{display:flex}
.ovbg{position:absolute;inset:0;background:rgba(2,2,2,.82);backdrop-filter:blur(6px)}
.ovcard{position:relative;z-index:1;width:100%;max-width:430px;max-height:92vh;overflow:auto;background:linear-gradient(180deg,#111,#080808);border:1px solid var(--border2);border-radius:18px;padding:22px}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:70;max-width:560px;margin:0 auto;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:linear-gradient(180deg,#121212,#0a0a0a);border-top:1px solid var(--border2);border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.8,.2,1);box-shadow:0 -20px 60px -20px #000}
.sheet.on{transform:translateY(0)}
.sheetbg{position:fixed;inset:0;z-index:69;background:rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.28s}
.sheetbg.on{opacity:1;pointer-events:auto}

/* ===== Liquid-glass rest timer overlay ===== */
#restov{position:fixed;inset:0;z-index:75;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;
  background:radial-gradient(circle at 50% 36%,rgba(22,36,58,.6),rgba(4,6,10,.88));
  backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%)}
#restov.on{display:flex;animation:fade .28s ease both}
#restov.done{background:radial-gradient(circle at 50% 36%,rgba(20,62,40,.58),rgba(4,9,6,.9))}
.restlabel{font-family:var(--disp);letter-spacing:.24em;font-size:13px;color:var(--blue);text-transform:uppercase}
#restov.done .restlabel{color:var(--green)}
.restring{position:relative;width:250px;height:250px;display:flex;align-items:center;justify-content:center}
.restring .glasscircle{position:absolute;inset:8px;border-radius:50%;
  background:linear-gradient(160deg,rgba(255,255,255,.12),rgba(255,255,255,.02) 60%);
  border:1px solid rgba(255,255,255,.16);box-shadow:0 10px 46px -10px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.22),inset 0 -18px 40px -22px rgba(0,0,0,.6);
  animation:restbreathe 4s ease-in-out infinite}
#restov.done .restring .glasscircle{border-color:rgba(46,204,113,.5);box-shadow:0 0 54px -6px rgba(46,204,113,.5),inset 0 1px 0 rgba(255,255,255,.22);animation:none}
@keyframes restbreathe{0%,100%{transform:scale(.92);opacity:.86}50%{transform:scale(1.07);opacity:1}}
.restring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.restnum{position:relative;z-index:2;font-family:var(--disp);font-size:60px;color:#eaf2ff;letter-spacing:.02em;text-shadow:0 2px 18px rgba(0,0,0,.55)}
.resthint{font-size:12.5px;color:var(--text2);letter-spacing:.05em;min-height:18px;transition:opacity .6s}
.restbtns{display:flex;gap:12px}
.restbtn{padding:13px 18px;border-radius:14px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));color:#e9eef6;font-family:var(--disp);letter-spacing:.06em;font-size:14px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.restbtn.go{background:linear-gradient(180deg,rgba(201,168,76,.34),rgba(201,168,76,.12));border-color:rgba(201,168,76,.5);color:var(--gold2)}
/* ===== MMA Round Timer overlay ===== */
#mmaov{position:fixed;inset:0;z-index:78;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;
  background:radial-gradient(circle at 50% 34%,rgba(58,20,18,.62),rgba(6,4,4,.9));
  backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);transition:background .5s}
#mmaov.on{display:flex;animation:fade .28s ease both}
#mmaov.rest{background:radial-gradient(circle at 50% 34%,rgba(18,44,62,.62),rgba(4,7,10,.92))}
#mmaov.prep{background:radial-gradient(circle at 50% 34%,rgba(54,44,16,.6),rgba(8,7,3,.92))}
#mmaov.done{background:radial-gradient(circle at 50% 34%,rgba(20,58,38,.6),rgba(4,9,6,.92))}
.mma-round{font-family:var(--disp);letter-spacing:.2em;font-size:14px;color:#ffd9d2;text-transform:uppercase}
#mmaov.rest .mma-round{color:#bfe2ff}#mmaov.prep .mma-round{color:var(--gold2)}#mmaov.done .mma-round{color:#9ff0c0}
.mma-phase{font-family:var(--disp);letter-spacing:.16em;font-size:30px;font-weight:800;text-transform:uppercase;color:#ff6a5a;text-shadow:0 2px 22px rgba(255,80,70,.4);line-height:1}
#mmaov.rest .mma-phase{color:#4fb6ff;text-shadow:0 2px 22px rgba(60,150,255,.4)}
#mmaov.prep .mma-phase{color:var(--gold2);text-shadow:0 2px 22px rgba(201,168,76,.4)}
#mmaov.done .mma-phase{color:var(--green);text-shadow:0 2px 22px rgba(46,204,113,.4)}
.mma-dots{display:flex;gap:6px;margin-top:-4px}
.mma-dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.16);transition:background .3s,box-shadow .3s}
.mma-dots i.done{background:#ff6a5a;box-shadow:0 0 8px rgba(255,80,70,.6)}
.mma-dots i.cur{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.7)}
.mma-next{font-size:12.5px;color:var(--text2);letter-spacing:.05em;min-height:18px}
/* ===== Progress photos ===== */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.pcell{position:relative;aspect-ratio:3/4;border-radius:11px;overflow:hidden;border:1px solid var(--border);background:var(--bg2);cursor:pointer}
.pcell img{width:100%;height:100%;object-fit:cover;display:block}
.pcell .pdate{position:absolute;left:0;right:0;bottom:0;padding:4px 6px;font-size:10px;color:#fff;background:linear-gradient(0deg,rgba(0,0,0,.78),transparent);font-family:var(--disp);letter-spacing:.04em}
.pcell.add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border-style:dashed;border-color:rgba(201,168,76,.5);color:var(--gold2)}
.pframe{position:relative;border-radius:14px;overflow:hidden;border:2px solid rgba(201,168,76,.55);box-shadow:0 0 30px -6px rgba(201,168,76,.4),inset 0 0 40px -10px rgba(0,0,0,.7)}
.pframe img{width:100%;display:block}
.pframe .pcorner{position:absolute;top:8px;left:8px;width:34px;height:34px;opacity:.92;filter:drop-shadow(0 2px 5px rgba(0,0,0,.6))}
.pframe .pcap{position:absolute;left:0;right:0;bottom:0;padding:14px 12px 9px;background:linear-gradient(0deg,rgba(0,0,0,.82),transparent);color:#fff}
.pcompare{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pcompare .pframe{border-width:1px}
.pcompare .plbl{position:absolute;top:8px;right:8px;font-size:10px;font-family:var(--disp);letter-spacing:.08em;padding:2px 8px;border-radius:20px;background:rgba(0,0,0,.6);color:var(--gold2);border:1px solid rgba(201,168,76,.4)}
#voicebtn.listening{color:#ff6a5a;border-color:#5a2018;background:#1a0b0a;animation:voicepulse 1s ease-in-out infinite}
@keyframes voicepulse{0%,100%{opacity:1}50%{opacity:.5}}
.confetti-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:5}
.confetti-layer i{position:absolute;top:-16px;width:9px;height:15px;border-radius:2px;opacity:.95;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(115vh) rotate(680deg);opacity:.25}}

/* boss */
.bossname{font-family:var(--disp);font-size:40px;letter-spacing:.04em;color:var(--gold2);text-align:center;line-height:.95}
.bossemoji{font-size:72px;text-align:center;margin:6px 0;filter:drop-shadow(0 0 18px rgba(201,168,76,.4))}
.bossquote{font-style:italic;color:var(--text2);text-align:center;font-size:14px;margin:8px 4px 14px}
.hpwrap{height:16px;border-radius:9px;background:#1a0a0a;border:1px solid #3a1a1a;overflow:hidden;margin:14px 0}
.hpwrap>i{display:block;height:100%;background:linear-gradient(90deg,var(--red),#ff6b5c);transition:width .35s}
/* MMA octagon boss fight */
.fightstage{position:relative;height:150px;margin:6px 0 4px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;overflow:hidden;border-radius:14px;background:radial-gradient(circle at 50% 130%,#1c1622,#0a0a0f 72%);border:1px solid #241c14}
.fightstage::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(115deg,transparent 0 22px,rgba(201,168,76,.04) 22px 23px);pointer-events:none}
.fightstage.shake{animation:hitShake .32s}
@keyframes hitShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(3px)}}
.fighter{font-size:60px;position:relative;z-index:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.6));transition:transform .15s}
.fighter.hero{animation:heroIdle 1.4s ease-in-out infinite}
@keyframes heroIdle{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-4px) rotate(3deg)}}
.fighter.hero.lunge{animation:heroLunge .32s ease}
@keyframes heroLunge{0%{transform:translateX(0)}45%{transform:translateX(64px) scale(1.12)}100%{transform:translateX(0)}}
.fighter.boss{animation:bossIdle 1.8s ease-in-out infinite}
@keyframes bossIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.fighter.boss.recoil{animation:bossRecoil .34s}
@keyframes bossRecoil{0%{transform:translateX(0) rotate(0)}30%{transform:translateX(20px) rotate(12deg);filter:brightness(1.7) sepia(1) saturate(5) hue-rotate(-28deg)}100%{transform:translateX(0) rotate(0)}}
.fighter.boss.ko{animation:bossKO 1s ease forwards}
@keyframes bossKO{0%{transform:rotate(0)}100%{transform:rotate(84deg) translateY(38px);opacity:.22;filter:grayscale(1)}}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:2}
.flash.on{animation:flashHit .3s}
@keyframes flashHit{0%{opacity:0}15%{opacity:.5}100%{opacity:0}}
.dmgpop{position:absolute;top:26%;left:60%;z-index:3;font-family:var(--disp);font-size:34px;color:#ff5a4a;text-shadow:0 0 10px rgba(255,60,40,.85);pointer-events:none;animation:floatHit .8s ease forwards}
@keyframes floatHit{0%{opacity:0;transform:translateY(0) scale(.6)}25%{opacity:1;transform:translateY(-12px) scale(1.18)}100%{opacity:0;transform:translateY(-46px) scale(1)}}
.strikemoji{position:absolute;top:32%;left:46%;z-index:2;font-size:30px;pointer-events:none;opacity:0}
.strikemoji.on{animation:strikeFly .34s ease}
@keyframes strikeFly{0%{opacity:0;transform:translateX(-26px) scale(.5)}40%{opacity:1;transform:translateX(18px) scale(1.2)}100%{opacity:0;transform:translateX(38px) scale(1)}}
/* ===== Cinematic upgrades: slow-mo KO, impact shockwave, big strike callout, screen flash ===== */
.fightstage{height:172px}
.fightstage.komode{animation:komoSlow 1.15s ease both}
@keyframes komoSlow{0%{filter:brightness(1) saturate(1)}12%{filter:brightness(2.6) saturate(1.5) contrast(1.25)}100%{filter:brightness(1) saturate(1)}}
.shockwave{position:absolute;top:50%;left:56%;width:18px;height:18px;border-radius:50%;border:3px solid #fff;transform:translate(-50%,-50%);opacity:.92;pointer-events:none;z-index:2;box-shadow:0 0 18px rgba(255,255,255,.7)}
.shockwave.go{animation:shockGo .62s cubic-bezier(.15,.7,.3,1) forwards}
@keyframes shockGo{0%{width:18px;height:18px;opacity:.95;border-width:4px}100%{width:240px;height:240px;opacity:0;border-width:1px}}
.bigstrike{position:absolute;top:50%;left:50%;z-index:4;transform:translate(-50%,-50%) scale(.4) rotate(-7deg);font-family:var(--disp);letter-spacing:.06em;font-size:30px;color:#fff;text-shadow:0 2px 0 #000,0 0 18px rgba(232,197,106,.8);pointer-events:none;opacity:0;white-space:nowrap}
.bigstrike.go{animation:bigStrikePop .62s cubic-bezier(.2,1.5,.4,1) forwards}
@keyframes bigStrikePop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-7deg)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.06) rotate(-3deg)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.14) rotate(-2deg)}}
.fighter.hero{font-size:66px}.fighter.boss{font-size:66px}
.fighter.boss.recoil{animation:bossRecoil .42s}
.fighter.boss.ko{animation:bossKO 1.15s ease forwards}
.scnflash{position:fixed;inset:0;z-index:120;background:#fff;opacity:0;pointer-events:none}
.scnflash.go{animation:scnFlash .5s ease forwards}
@keyframes scnFlash{0%{opacity:0}18%{opacity:.85}100%{opacity:0}}
/* ===== Villain DEFEATED reveal — a high-impact "wanted poster" dossier ===== */
.vreveal{text-align:center;padding:2px 0 4px}
.vmug{position:relative;width:192px;height:200px;margin:8px auto 2px;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:2.5px solid var(--vc,#888);background:radial-gradient(circle at 50% 30%,rgba(255,255,255,.10),rgba(8,8,12,.96) 62%);box-shadow:0 0 46px -8px var(--vc,#888),inset 0 0 70px rgba(0,0,0,.7);animation:mugIn .55s cubic-bezier(.2,.8,.2,1) both}
@keyframes mugIn{0%{opacity:0;transform:scale(.82) translateY(14px)}100%{opacity:1;transform:none}}
.vmug::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 21px,rgba(255,255,255,.06) 21px 23px);z-index:0}
.vmug::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 32%,rgba(255,255,255,.14),transparent 58%);z-index:0;mix-blend-mode:screen}
.vmug .heightno{position:absolute;left:7px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:space-between;padding:8px 0;font-family:var(--disp);font-size:9px;color:rgba(255,255,255,.28);z-index:1;letter-spacing:.1em}
.vface{position:relative;z-index:2;font-size:108px;line-height:1;filter:drop-shadow(0 7px 20px rgba(0,0,0,.75));animation:vfaceIn .85s cubic-bezier(.2,.8,.2,1) .08s both}
@keyframes vfaceIn{0%{opacity:0;transform:scale(.55) translateY(22px)}70%{transform:scale(1.05)}100%{opacity:1;transform:none}}
.vmugcap{position:absolute;left:0;right:0;bottom:0;z-index:2;font-family:var(--mono,monospace);font-size:9.5px;letter-spacing:.18em;color:rgba(255,255,255,.6);background:linear-gradient(0deg,rgba(0,0,0,.72),transparent);padding:13px 0 4px}
.vstamp{position:absolute;z-index:5;top:48%;left:50%;font-family:var(--disp);letter-spacing:.12em;font-size:27px;color:#ff3b2f;border:4px solid #ff3b2f;border-radius:7px;padding:4px 13px;background:rgba(24,5,4,.32);text-shadow:0 0 10px rgba(255,40,30,.55);box-shadow:0 0 24px rgba(255,40,30,.4),inset 0 0 14px rgba(255,40,30,.25);transform:translate(-50%,-50%) rotate(-15deg) scale(2.7);opacity:0;animation:stampSlam .46s cubic-bezier(.3,1.5,.45,1) .8s forwards}
@keyframes stampSlam{0%{opacity:0;transform:translate(-50%,-50%) rotate(-15deg) scale(2.7)}55%{opacity:1}100%{opacity:1;transform:translate(-50%,-50%) rotate(-13deg) scale(1)}}
.vname2{font-family:var(--disp);font-size:30px;letter-spacing:.03em;line-height:1.04;margin:12px 6px 2px;color:#fff;animation:fade .5s 1.05s both}
.vsub{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--green);font-family:var(--disp);animation:fade .5s 1.18s both}
.combatlog{text-align:center;font-family:var(--disp);letter-spacing:.05em;font-size:17px;color:var(--gold2);min-height:22px;margin:8px 0 2px}
.roundbadge{display:inline-block;font-family:var(--disp);letter-spacing:.14em;font-size:12px;color:#ff5a4a;border:1px solid #5a2018;background:#1a0b0a;border-radius:20px;padding:3px 12px;animation:flicker 1.6s infinite}

/* recovery rings (heartbeat) */
.rring{cursor:pointer;flex:1;min-width:48px}
@keyframes ringbeat{0%,100%{transform:scale(1)}13%{transform:scale(1.09)}26%{transform:scale(1)}40%{transform:scale(1.05)}54%{transform:scale(1)}}
.rring svg.beat{animation:ringbeat 1.5s ease-in-out infinite;transform-origin:center}

/* MMA title belts */
.beltmedal{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;background:radial-gradient(circle at 50% 32%,rgba(255,255,255,.14),#13151b 75%);border:1.5px solid var(--bc,#8b8b8b);box-shadow:0 0 13px -3px var(--bc,#8b8b8b),inset 0 1px 0 rgba(255,255,255,.12)}
.beltrow:first-of-type{border-top:none!important}

/* misc */
.goal-card{padding:15px;border:1px solid var(--border2);border-radius:13px;background:var(--bg2);margin-bottom:10px;transition:.12s}
.goal-card.on{border-color:var(--gold);background:var(--gold-bg)}
.goal-card .gt{font-family:var(--disp);font-size:22px;color:var(--gold2);letter-spacing:.06em}
.banner{border:1px solid var(--border2);border-radius:12px;padding:12px 13px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;background:linear-gradient(180deg,#14110a,#0c0a06)}
.banner.alert{background:linear-gradient(180deg,#1a0d0a,#0c0706);border-color:#4a2420}
.banner .x{margin-left:auto;color:var(--text3);font-size:20px;flex:none;padding:0 4px}
.splash{position:fixed;inset:0;z-index:90;background:#060606;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.batlogo{font-size:90px;animation:pulseLogo 1.4s ease-in-out infinite}
.brandlogo{width:132px;height:132px;object-fit:contain;display:block;margin:0 auto;animation:pulseLogo 2.6s ease-in-out infinite;filter:drop-shadow(0 4px 16px rgba(201,168,76,.32))}
.brandlogo.sm{width:34px;height:34px;margin:0;animation:none;filter:drop-shadow(0 2px 8px rgba(201,168,76,.45))}
.brandlogo.splash{width:172px;height:172px}
.ob-dots{display:flex;gap:7px;justify-content:center;margin:0 0 14px}
.ob-dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.16);transition:.25s}
.ob-dots i.on{background:var(--gold2);width:22px;border-radius:4px;box-shadow:0 0 10px rgba(201,168,76,.55)}
@keyframes pulseLogo{0%,100%{transform:scale(1);filter:drop-shadow(0 0 8px rgba(201,168,76,.3))}50%{transform:scale(1.08);filter:drop-shadow(0 0 28px rgba(201,168,76,.6))}}
@keyframes breathe{0%,100%{transform:scaleY(1) translateY(0)}50%{transform:scaleY(1.02) translateY(-2px)}}
.suit-breathe{animation:breathe 4s ease-in-out infinite;transform-origin:bottom center}
.fade{animation:fade .35s ease both}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ssgroup{position:relative;border-left:2px solid rgba(232,69,60,.55);border-radius:0 14px 14px 0;padding-left:9px;margin-bottom:13px;background:linear-gradient(90deg,rgba(232,69,60,.07),transparent 55%)}
.ssgroup .card{margin-bottom:8px}
.ssgroup .card:last-of-type{margin-bottom:4px}
.sshead{display:flex;align-items:center;gap:6px;font-family:var(--disp);letter-spacing:.13em;font-size:12px;color:#ff8378;padding:9px 4px 5px}
.sshead em{font-style:normal;font-family:inherit;letter-spacing:normal;color:var(--text3);font-weight:400;font-size:11px;text-transform:none}
.vcamp{position:relative;margin-top:4px}
.vcamp .vrail{position:absolute;left:22px;top:18px;bottom:18px;width:2px;background:linear-gradient(180deg,rgba(232,69,60,.45),rgba(124,150,255,.18) 60%,rgba(255,255,255,.06));z-index:0}
.vrow{display:flex;gap:12px;align-items:flex-start;padding:8px 0;position:relative;z-index:1}
.vmed{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none;border:2px solid var(--bc,#555);background:#0c0f15;position:relative}
.vmed.done{box-shadow:0 0 0 3px rgba(46,204,113,.16),0 0 16px -3px var(--bc)}
.vmed.cur{box-shadow:0 0 0 3px rgba(232,197,106,.18),0 0 18px -2px var(--bc);animation:vpulse 1.8s ease-in-out infinite}
.vmed.lock{filter:grayscale(1) brightness(.55);opacity:.5}
.vmed .vchk{position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;border-radius:50%;background:var(--green);color:#04180a;font-size:11px;display:flex;align-items:center;justify-content:center;border:2px solid #0c0f15}
@keyframes vpulse{0%,100%{box-shadow:0 0 0 3px rgba(232,197,106,.16),0 0 14px -3px var(--bc)}50%{box-shadow:0 0 0 4px rgba(232,197,106,.28),0 0 22px 0 var(--bc)}}
.heat{display:grid;grid-template-columns:repeat(26,1fr);gap:2px}
.heat i{aspect-ratio:1;border-radius:2px;background:var(--bg4)}
.spark{display:flex;align-items:flex-end;gap:3px;height:38px}
.spark i{flex:1;background:var(--gold-dim);border-radius:2px 2px 0 0;min-height:2px}
.dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
.dots i{width:7px;height:7px;border-radius:50%;background:var(--border2)}
.dots i.on{background:var(--gold2)}
.badge{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:1px solid var(--border);border-radius:11px;background:var(--bg2);text-align:center;position:relative;transition:transform .12s}
.badge.locked{opacity:.32;filter:grayscale(1)}
.badge.earned{border-color:rgba(232,197,106,.4);background:linear-gradient(180deg,rgba(232,197,106,.1),var(--bg2));box-shadow:0 0 14px -4px rgba(232,197,106,.45)}
.badge.earned .be{filter:drop-shadow(0 2px 6px rgba(232,197,106,.5))}
.badge:active{transform:scale(.94)}
.badge .be{font-size:24px}.badge .bn{font-size:10px;line-height:1.1;color:var(--text2)}
.acbar{height:6px;border-radius:4px;background:var(--bg2);overflow:hidden;margin:2px 0 10px;border:1px solid var(--border)}
.acbar i{display:block;height:100%;background:linear-gradient(90deg,#c9a84c,#e8c56a);box-shadow:0 0 8px rgba(232,197,106,.6)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}
.classified{background:#0c0c0c;border:1px dashed var(--border2);border-radius:12px;padding:16px;font-family:'DM Mono',ui-monospace,monospace}
.stamp{display:inline-block;border:2px solid var(--red);color:var(--red);font-family:var(--disp);letter-spacing:.18em;padding:3px 9px;border-radius:5px;transform:rotate(-5deg);font-size:14px}
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
::-webkit-scrollbar{width:0;height:0}
.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(20px);z-index:80;background:#181818;border:1px solid var(--gold-dim);color:var(--gold2);padding:11px 16px;border-radius:30px;font-weight:600;font-size:13.5px;opacity:0;transition:.3s;pointer-events:none;max-width:90%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes sumFade{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.sumstats{display:flex;gap:8px;margin-bottom:13px}

.sumstat:nth-child(1){animation-delay:.1s}.sumstat:nth-child(2){animation-delay:.17s}.sumstat:nth-child(3){animation-delay:.24s}

.sumvol{text-align:center;animation:sumFade .5s .3s both}
.sumvol .vbig{font-family:var(--disp);font-size:46px;color:var(--gold2);line-height:.92;text-shadow:0 3px 20px rgba(232,197,106,.28)}
.prribbon{position:relative;overflow:hidden;margin-top:13px;border-radius:13px;padding:11px 13px;background:linear-gradient(120deg,rgba(46,204,113,.14),rgba(232,197,106,.12));border:1px solid rgba(46,204,113,.4);animation:sumFade .5s .38s both,prGlow 2.4s ease-in-out infinite}

.entr{position:fixed;inset:0;z-index:9998;overflow:hidden;background:radial-gradient(120% 90% at 50% 12%,#11151d 0%,#080a0e 55%,#000 100%);opacity:1;transition:opacity .5s ease;perspective:560px}
.entr.out{opacity:0}
.entr-lights{position:absolute;top:0;left:0;right:0;height:13%;display:flex;gap:6%;justify-content:center;padding:0 7%}
.entr-lights i{flex:1;max-width:64px;height:9px;margin-top:11px;border-radius:0 0 7px 7px;background:linear-gradient(#fff,rgba(232,197,106,.5));box-shadow:0 0 26px 7px rgba(232,197,106,.5);opacity:0;animation:entrLight .25s forwards}

@keyframes entrLight{from{opacity:0}to{opacity:.85}}
.entr-floor{position:absolute;left:50%;bottom:0;width:240%;height:46%;transform:translateX(-50%) rotateX(70deg);transform-origin:bottom center;background-image:repeating-linear-gradient(90deg,transparent 0 46px,rgba(232,197,106,.16) 46px 48px),repeating-linear-gradient(0deg,transparent 0 46px,rgba(232,197,106,.10) 46px 48px);opacity:0;animation:entrLight .5s .35s forwards;-webkit-mask-image:linear-gradient(transparent,#000 55%);mask-image:linear-gradient(transparent,#000 55%)}
.entr-stage{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.entr-beam{position:absolute;top:48%;left:50%;width:140vw;height:64vh;transform:translate(-50%,-50%);background:conic-gradient(from 90deg at 0% 50%,transparent 78deg,rgba(232,197,106,.16) 90deg,transparent 102deg);opacity:0;animation:entrBeam 1.4s .55s ease-out forwards;pointer-events:none}
@keyframes entrBeam{0%{opacity:0}30%{opacity:.9}100%{opacity:0}}
.entr-veh{font-size:118px;line-height:1;filter:drop-shadow(0 14px 20px rgba(0,0,0,.7)) drop-shadow(0 0 26px rgba(232,197,106,.32));transform:translateX(-135%) scale(.55);opacity:0;animation:entrDrive 1.95s .35s cubic-bezier(.2,.85,.2,1) forwards}
@keyframes entrDrive{0%{transform:translateX(-135%) scale(.55);opacity:0}22%{opacity:1}65%{transform:translateX(6%) scale(1.08)}82%{transform:translateX(-2%) scale(1)}100%{transform:translateX(0) scale(1)}}
.entr-veh .glints{position:absolute}
.entr-streak{position:absolute;top:48%;left:0;width:60%;height:4px;border-radius:4px;background:linear-gradient(90deg,transparent,rgba(232,197,106,.55),transparent);opacity:0;animation:entrStreak .55s ease-out forwards}
.entr-streak.s2{top:42%;height:3px;animation-delay:.5s}.entr-streak.s3{top:55%;height:3px;animation-delay:.62s}.entr-streak.s1{animation-delay:.45s}

@keyframes entrFlash{0%{opacity:0}6%{opacity:.55}26%{opacity:0}100%{opacity:0}}
.entr-cap{text-align:center;margin-top:20px;opacity:0;animation:entrTitle .6s 1.75s cubic-bezier(.16,.9,.22,1) forwards}
.entr-kick{letter-spacing:5px;font-size:11.5px;font-weight:700;color:var(--gold2);text-transform:uppercase}
.entr-name{font-family:var(--disp);font-size:38px;line-height:1.02;color:#fff;text-shadow:0 3px 24px rgba(232,197,106,.4);margin-top:3px}

#modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:20px}

.ledcell{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:11px 6px;text-align:center}

function subBias(m,id){return (SUBBIAS[m]||{})[id]||null;}
function subName(m,id){const r=(SUBG[m]||[]).find(x=>x[0]===id);return r?r[1]:id;}
function subTerm(m,id){const r=(SUBG[m]||[]).find(x=>x[0]===id);return r?r[2]:id;}
// which sub-regions of muscle m does this exercise hit? (inferred from movement name)
function exSub(ex,m){
  const n=((ex&&ex.n)||"").toLowerCase(), has=(...ks)=>ks.some(k=>n.includes(k));
  switch(m){
    case"chest":     if(has("incline","upper"))return["up"]; if(has("decline","dip","low","korean"))return["lo"]; return["mid","lo"];
    case"shoulders": if(has("lateral","upright","side"))return["side"]; if(has("rear","reverse fly","reverse-grip","reverse curl")||has("reverse")&&has("fly"))return["rear"]; if(has("front"))return["front"]; if(has("reverse"))return["rear"]; return["front","side"];
    case"triceps":   if(has("overhead","skull","french","pullover"))return["long"]; if(has("reverse-grip","reverse grip"))return["med","lat"]; if(has("pushdown","kickback","dip","close","jm","press"))return["lat","med"]; return["lat","long"];
    case"biceps":    if(has("incline","behind"))return["long"]; if(has("preacher","spider","concentration"))return["short"]; if(has("hammer","reverse","neutral"))return["brach"]; return["long","short"];
    case"back":      if(has("deadlift","good morning","straight leg","straight-leg","straight arm","straight-arm"))return has("pulldown")?["ulat"]:["ere"]; if(has("pulldown","pull-up","pullup","pull up","chin","muscle up","pullover"))return["ulat"]; if(has("row"))return["llat","mid"]; if(has("face pull","rear","upper row"))return["mid"]; return["ulat","llat"];
    case"quads":     if(has("adduction","adductor","inner"))return["add"]; if(has("extension","sissy"))return["rec","vas"]; return["vas","rec"];
    case"hamstrings":if(has("curl","femoral","glute-ham","glute ham"))return["knee"]; if(has("romanian","rdl","stiff","straight leg","straight-leg","good morning","deadlift","femoral"))return["hip"]; return["hip","knee"];
    case"glutes":    if(has("abduction","kickback"))return["med"]; return["max"];
    case"calves":    if(has("seated"))return["sol"]; return["gas"];
    case"abs":       if(has("leg raise","hanging","jackknife","v-up","knee raise","hip raise","reverse","otis"))return["lo"]; if(has("twist","side bend","oblique","russian","woodchop","landmine","bent press"))return["obl"]; return["up"];
    case"traps":     if(has("decline"))return["mid"]; return["up"];
    case"forearms":  if(has("reverse"))return["ext"]; if(has("hammer","pronation"))return["brad"]; return["flex"];
    default:return[];
  }
}

/* ========================= MOVEMENT-POSE FIGURES =========================
   Each exercise is classified into a movement pattern; a posed humanoid is drawn in that
   pose (lying press, squat, hinge, curl, pulldown, lateral raise…) with the WORKED muscle
   glowing red. Built parametrically from a skeleton so all 134 lifts get a live figure. */
function movePattern(ex){
  const n=((ex&&ex.n)||"").toLowerCase(), p=(ex&&ex.p&&ex.p[0])||"chest", has=(...k)=>k.some(x=>n.includes(x));
  if(p==="chest"){if(has("incline","upper"))return"incline";if(has("fly","crossover","pec"))return"fly";if(has("dip","korean"))return"dip";if(has("push-up","push up","pushup","deep push"))return"pushup";if(has("pullover"))return"pullover";return"bench";}
  if(p==="shoulders"){if(has("lateral","raise")&&has("lateral"))return"lateral";if(has("rear","reverse"))return"rearfly";if(has("front"))return"frontraise";if(has("upright"))return"upright";if(has("lateral"))return"lateral";return"ohp";}
  if(p==="triceps"){if(has("overhead","skull","french","pullover"))return"ohext";if(has("dip","close","jm","press"))return"dip";if(has("kickback"))return"kickback";return"pushdown";}
  if(p==="biceps"){if(has("preacher"))return"curl";return"curl";}
  if(p==="forearms")return"curl";
  if(p==="back"){if(has("deadlift"))return"deadlift";if(has("pulldown","pull-up","pullup","pull up","chin","muscle up"))return"pulldown";if(has("pullover"))return"pullover";if(has("straight arm","straight-arm"))return"pulldown";if(has("shrug"))return"shrug";if(has("good morning","straight leg"))return"deadlift";return"row";}
  if(p==="traps"){if(has("upright"))return"upright";return"shrug";}
  if(p==="quads"){if(has("extension"))return"legext";if(has("press"))return"legpress";if(has("lunge","split","step","curtsey"))return"lunge";if(has("adduction"))return"squat";return"squat";}
  if(p==="hamstrings"){if(has("curl","femoral","glute-ham","glute ham"))return"legcurl";return"deadlift";}
  if(p==="glutes"){if(has("bridge","thrust","hip raise"))return"hipthrust";if(has("abduction","kickback"))return"abduction";if(has("deadlift","good morning"))return"deadlift";return"squat";}
  if(p==="calves")return"calf";
  if(p==="abs"){if(has("leg raise","hanging","knee raise"))return"legraise";if(has("twist","russian","side","oblique","woodchop","landmine","bent press"))return"twist";if(has("plank"))return"plank";return"crunch";}
  return"bench";
}

const MM_BACK=new Set(["back","traps","triceps","glutes","hamstrings","calves"]);
// Reusable anatomy renderer. view = "front"|"back"; col(muscle)->fill string.
function muscleBodySVG(view,col){
  const OL="#262c35";
  // limb = dark outline + body-gradient core + an offset light sheen for 3D roundness
  const limb=(x1,y1,x2,y2,w)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${OL}" stroke-width="${w+2}" stroke-linecap="round"/><line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="url(#mbg)" stroke-width="${w}" stroke-linecap="round"/><line x1="${(x1-0.5).toFixed(2)}" y1="${(y1-0.4).toFixed(2)}" x2="${(x2-0.5).toFixed(2)}" y2="${(y2-0.4).toFixed(2)}" stroke="#c6cfdc" stroke-width="${(w*0.32).toFixed(2)}" stroke-linecap="round" opacity="0.5"/>`;
  const defs=`<defs>`

    +`</defs>`;
  const legs=limb(46,65,45,82,7)+limb(45,82,45,95,6)+limb(54,65,55,82,7)+limb(55,82,55,95,6)+`<ellipse cx="44" cy="96" rx="4" ry="2" fill="url(#mbg)"/><ellipse cx="56" cy="96" rx="4" ry="2" fill="url(#mbg)"/>`;
  const arms=limb(36,32,31,50,5)+limb(31,50,28,66,4)+limb(64,32,69,50,5)+limb(69,50,72,66,4)+`<circle cx="27.5" cy="67" r="2.6" fill="url(#mbg)"/><circle cx="72.5" cy="67" r="2.6" fill="url(#mbg)"/>`;
  const T1="M36,31 Q50,27 64,31 L59,50 Q56,58 54,64 L46,64 Q44,58 41,50 Z";
  const torso=`<path d="${T1}" fill="url(#mbg)" stroke="${OL}" stroke-width="0.9"/><path d="${T1}" fill="url(#occ)"/><path d="${T1}" fill="url(#gloss)"/><path d="M46,64 L54,64 L55,70 Q50,72.5 45,70 Z" fill="url(#mbg)" stroke="${OL}" stroke-width="0.9"/>`;
  const head=`<path d="M46,19 L54,19 L55,25 L45,25 Z" fill="url(#mbg)" stroke="${OL}" stroke-width="0.7"/><circle cx="50" cy="12.5" r="7.5" fill="url(#mbg)" stroke="${OL}" stroke-width="1"/><circle cx="50" cy="12.5" r="7.5" fill="url(#gloss)"/>`;
  // each muscle = colour fill + bottom occlusion + top-left gloss (per-muscle bbox gradients = instant 3D roundness)
  const mp=(d,c)=>`<path d="${d}" fill="${c}"/><path d="${d}" fill="url(#occ)"/><path d="${d}" fill="url(#gloss)" stroke="#2b323c" stroke-width="0.35" stroke-linejoin="round"/>`;
  let L="",C="";
  if(view==="front"){
    L =mp("M40,30 C36,28 31,29 30,34 C29,38 32,41 36,40 C40,39 42,34 40,30 Z",col("shoulders"))
      +mp("M49,31 C45,29 41,30 39,33 C37,37 38,43 43,45 C47,46 49,44 49,40 Z",col("chest"))
      +mp("M35,39 C31,41 28,46 28,51 C28,54 31,54 33,50 C36,45 37,41 35,39 Z",col("biceps"))
      +mp("M29,53 C26,57 25,61 26,65 C26,67 29,66 29,62 C30,58 31,55 29,53 Z",col("forearms"))
      +mp("M44.5,50 C42,53 42,58 44,62 C44.8,60 45,55 45,51 Z",col("abs"))
      +mp("M47,65 C42,66 40,72 41,79 C42,82 46,82 47,78 C48,72 49,67 47,65 Z",col("quads"))
      +mp("M45.6,83 C43,86 43,90 44,93 C45,92 46,88 46,84 Z",col("quads"));
    C =mp("M45.5,45 C47,44 53,44 54.5,45 L54.5,61 C53,62.5 47,62.5 45.5,61 Z",col("abs"))
      +`<g stroke="#39414d" stroke-width="0.4" opacity="0.7" fill="none"><line x1="50" y1="45.5" x2="50" y2="61"/><line x1="46" y1="50" x2="54" y2="50"/><line x1="46" y1="55" x2="54" y2="55"/></g>`;
  } else {
    L =mp("M40,30 C36,28 31,29 30,34 C29,38 32,41 36,40 C40,39 42,34 40,30 Z",col("shoulders"))
      +mp("M40,34 C35,38 35,47 41,53 C45,56 48,53 48,46 C48,40 45,36 40,34 Z",col("back"))
      +mp("M35,39 C31,41 28,46 28,51 C28,54 31,54 33,50 C36,45 37,41 35,39 Z",col("triceps"))

    C =mp("M50,23 C45,25 41,29 39,33 C44,35 47,36 50,37 C53,36 56,35 61,33 C59,29 55,25 50,23 Z",col("traps"))
      +`<g stroke="#39414d" stroke-width="0.4" opacity="0.6" fill="none"><line x1="48" y1="50" x2="48" y2="61"/><line x1="52" y1="50" x2="52" y2="61"/></g>`;
  }
  const ov=L+`<g transform="matrix(-1 0 0 1 100 0)">${L}</g>`+C;

// ===== Unified anatomy: the Batsuit body (same one in the SUIT & GOTHAM tabs) used EVERYWHERE. col(muscle)->{fill,op} =====
function suitFigure(view,colFn,style){
  const prev=state._figColor;state._figColor=colFn;
  const P=suitProps();
  const body=(view==="back"?_backBody:_frontBody)(125,P);
  state._figColor=prev;
  const defs=(state._figShade||state._figGlow)?SUIT_DEFS:'';
  return `<svg viewBox="58 40 134 380" preserveAspectRatio="xMidYMid meet" style="${style||'width:100%;height:100%;display:block'}">${defs}${body}</svg>`;
}
function suitFigureFB(colFn){
  const prev=state._figColor;state._figColor=colFn;
  const ps=state._figShade,pg=state._figGlow;state._figShade=true;state._figGlow=true;
  const P=suitProps();
  const lbl=(cx,t)=>`<text x="${cx}" y="22" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="12" letter-spacing="3" fill="#8B6B2A">${t}</text>`;
  const div=`<line x1="250" y1="12" x2="250" y2="418" stroke="#2A2520" stroke-width="1" stroke-dasharray="4,4"/>`;
  const svg=`<svg viewBox="0 0 500 430" preserveAspectRatio="xMidYMid meet" style="width:100%;display:block">${SUIT_DEFS}${lbl(125,"FRONT")}${lbl(375,"BACK")}${div}${_frontBody(125,P)}${_backBody(375,P)}</svg>`;
  state._figColor=prev;state._figShade=ps;state._figGlow=pg;
  return svg;
}
function bodyFig(ex){
  const prim=MM_NORM((ex.p&&ex.p[0])||"chest");
  const sec=new Set((ex.s||[]).map(MM_NORM));
  const view=MM_BACK.has(prim)?"back":"front";
  const col=m=> m===prim?{fill:"#E8453C",op:".95"}:(sec.has(m)?{fill:"#E8C56A",op:".5"}:{fill:"#E8C56A",op:".06"});
  return suitFigure(view,col);
}
// Live session muscle map: front + back Batsuit lighting up every muscle hit so far.
function sessionMuscleMap(muscleList){
  const hi=new Set((muscleList||[]).map(MM_NORM));
  const col=m=> hi.has(m)?{fill:"#E8453C",op:".95"}:{fill:"#E8C56A",op:".07"};
  return `<div class="stage" style="border-radius:14px;overflow:hidden;padding:6px 6px 2px">${suitFigureFB(col)}</div>`;
}
// Intensity heat: a muscle's red brightness scales with its WEEKLY working-set volume vs its landmarks.
// 0 sets = cool grey; MEV = dim ember; MAV = bright red; ≥MRV = white-hot (overreaching).
function heatColor(m){
  const s=weeklySets(MM_NORM(m)), lm=VL[MM_NORM(m)]||{mev:8,mav:14,mrv:20};
  if(!(s>0))return "#566070";
  const r=Math.min(s/lm.mav,1.5);                 // 0..1.5 of MAV
  const L=Math.round(33+Math.min(r,1)*23+Math.max(0,r-1)*16);  // 33% → 56% → ~64%
  const S=Math.round(72+Math.min(r,1)*22);                     // 72% → 94%
  const H=Math.round(6-Math.max(0,r-1)*6);                     // shifts toward orange when over MAV
  return `hsl(${H} ${S}% ${L}%)`;
}
function heatLabel(m){
  const s=weeklySets(MM_NORM(m)), lm=VL[MM_NORM(m)]||{mev:8,mav:14,mrv:20};
  if(!(s>0))return ["Untrained","var(--text3)"];
  if(s<lm.mev)return ["Below maintenance","var(--text2)"];
  if(s<lm.mav)return ["Productive zone","var(--yellow)"];
  if(s<=lm.mrv)return ["Optimal / high","var(--green)"];
  return ["Over MRV — junk risk","var(--red)"];
}
// Compact heat body: lights the tapped muscle by training intensity, on a Gym80-style dark tile.
function muscleHeatFig(m){
  const nm=MM_NORM(m), view=MM_BACK.has(nm)?"back":"front";
  const hc=heatColor(nm), col=mm=> mm===nm?{fill:hc,op:".95"}:{fill:"#E8C56A",op:".06"};
  const [lab,lc]=heatLabel(nm), s=weeklySets(nm), lm=VL[nm]||{mev:8,mav:14,mrv:20};
  const ps=state._figShade,pg=state._figGlow;state._figShade=true;state._figGlow=true;
  const fig=suitFigure(view,col);state._figShade=ps;state._figGlow=pg;
  return `<div class="row" style="gap:12px;align-items:center;margin-bottom:10px">
    <div class="stage" style="width:104px;height:104px;flex:none;border-radius:14px;overflow:hidden">${fig}</div>
    <div style="min-width:0">
      <div class="mini" style="color:var(--text3);letter-spacing:.1em;margin-bottom:2px">INTENSITY HEAT</div>
      <div style="font-weight:800;color:${lc};font-size:15px;line-height:1.1">${lab}</div>
      <div class="mini" style="margin-top:4px;color:var(--text2)">${s>0?s+" hard set"+(s===1?"":"s")+" this week":"No sets logged this week"}</div>
      <div style="height:7px;border-radius:5px;margin-top:7px;background:linear-gradient(90deg,#566070,hsl(6 80% 38%),hsl(4 92% 56%),hsl(0 94% 64%))"></div>
      <div class="row sp mini" style="margin-top:2px;color:var(--text3)"><span>MEV ${lm.mev}</span><span>MAV ${lm.mav}</span><span>MRV ${lm.mrv}</span></div>
    </div></div>`;
}
function figureSVG(ex){
  return bodyFig(ex);
  const pat=movePattern(ex), P=POSE[pat]||POSE.bench;
  const prim=(ex.p&&ex.p[0])||"chest", sec=ex.s||[];
  const B="#5b6473",OL="#39414f",IMP="#7c8694",R="#E8453C",RS="#cf6159";
  const lerp=(a,b,t)=>[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t];
  const limb=(a,b,w)=>a&&b?`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${OL}" stroke-width="${w+2.6}" stroke-linecap="round"/><line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${B}" stroke-width="${w}" stroke-linecap="round"/>`:"";
  const glow=(p,r,col)=>p?`<ellipse cx="${p[0]}" cy="${p[1]}" rx="${r*1.7}" ry="${r*1.7}" fill="${col}" opacity="0.20"/><ellipse cx="${p[0]}" cy="${p[1]}" rx="${r}" ry="${r}" fill="${col}" opacity="0.92"/>`:"";
  const sh=P.sh,el=P.el,ha=P.ha,hip=P.hip,kn=P.kn,ft=P.ft;
  // muscle → anchor on this skeleton
  function anchor(m){
    switch(m){
      case"chest":return lerp(sh,hip,0.22);
      case"back":case"traps":return lerp(sh,hip,0.12);
      case"shoulders":return sh;
      case"biceps":case"triceps":return el?lerp(sh,el,0.55):lerp(sh,hip,0.25);
      case"forearms":return (el&&ha)?lerp(el,ha,0.5):null;
      case"abs":return lerp(sh,hip,0.62);
      case"glutes":return hip;
      case"quads":case"hamstrings":return (hip&&kn)?lerp(hip,kn,0.5):null;
      case"calves":return (kn&&ft)?lerp(kn,ft,0.5):null;
      default:return lerp(sh,hip,0.3);
    }
  }
  // implement
  let imp="";
  if(P.imp){const t=P.imp;
    if(t[0]==="bar")imp=`<rect x="${t[1]-15}" y="${t[2]-1.4}" width="30" height="2.8" rx="1.4" fill="${IMP}"/><circle cx="${t[1]-15}" cy="${t[2]}" r="3.4" fill="${IMP}"/><circle cx="${t[1]+15}" cy="${t[2]}" r="3.4" fill="${IMP}"/>`;
    else if(t[0]==="barb"||t[0]==="barT")imp=`<rect x="${t[1]-4}" y="${Math.min(t[2],t[4]||t[2])-1.4}" width="${(t[3]-t[1])+8}" height="2.8" rx="1.4" fill="${IMP}"/>`;
    else if(t[0]==="db")imp=`<rect x="${t[1]-5}" y="${t[2]-2.6}" width="10" height="5.2" rx="2" fill="${IMP}"/><rect x="${t[1]-6.5}" y="${t[2]-4}" width="3" height="8" rx="1.2" fill="${IMP}"/><rect x="${t[1]+3.5}" y="${t[2]-4}" width="3" height="8" rx="1.2" fill="${IMP}"/>`;
    else if(t[0]==="cab")imp=`<line x1="${t[1]}" y1="${t[2]}" x2="${t[3]}" y2="${t[4]}" stroke="${IMP}" stroke-width="1.2" opacity="0.7"/><rect x="${t[3]-6}" y="${t[4]-1.3}" width="12" height="2.6" rx="1.3" fill="${IMP}"/>`;
    else if(t[0]==="plate")imp=`<rect x="${t[1]-2}" y="${t[2]}" width="5" height="22" rx="2" fill="${IMP}"/>`;
  }
  if(P.bench){const b=P.bench;imp+=`<rect x="${b[0]}" y="${b[1]}" width="${b[2]}" height="${b[3]||5}" rx="2" fill="#c2c8d2" stroke="${OL}" stroke-width="0.6"/>`;}
  // body
  let body="";
  // back leg (mirrored, dimmer) for standing poses
  if(P.dbl&&hip&&kn&&ft){const o=4;body+=`<g opacity="0.55">${limb([hip[0]-o,hip[1]],[kn[0]-o,kn[1]+1],7)}${limb([kn[0]-o,kn[1]+1],[ft[0]-o,ft[1]],6)}</g>`;}
  // legs
  body+=limb(hip,kn,8)+limb(kn,ft,7);
  if(P.toe&&ft)body+=`<ellipse cx="${ft[0]-2}" cy="${ft[1]+2}" rx="5" ry="2.4" fill="${B}"/>`;
  // torso
  body+=limb(sh,hip,17);
  // arms
  if(el)body+=limb(sh,el,7)+(ha?limb(el,ha,6):"");
  // head
  body+=`<circle cx="${P.head[0]}" cy="${P.head[1]}" r="${P.head[2]}" fill="${B}" stroke="${OL}" stroke-width="1"/>`;
  // glows: secondary first (under), primary on top
  let gl="";
  sec.forEach(m=>{const a=anchor(m);if(a)gl+=glow(a,4.2,RS);});
  const ap=anchor(prim);if(ap)gl+=glow(ap,5.4,R);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" style="display:block">${imp}${body}${gl}</svg>`;
}

/* ========================= EXERCISE DB LOADING ========================= */
function indexEx(){EXBYNAME={};EXDB.forEach(e=>{if(!EXBYNAME[e.n.toLowerCase()])EXBYNAME[e.n.toLowerCase()]=e;});}
// User-created exercises live in state.data.customEx (array). Merge them into the active EXDB.
function customExList(){const ce=state&&state.data&&state.data.customEx;if(Array.isArray(ce))return ce;if(ce&&typeof ce==="object")return Object.values(ce);return [];}
function mergeCustomEx(){const have=new Set(EXDB.map(e=>e.id));customExList().forEach(e=>{if(e&&e.id&&!have.has(e.id)){EXDB.push(e);have.add(e.id);}});indexEx();}
/* free-exercise-db (public-domain, The Unlicense) supplies real exercise photos.
   We use ONLY the curated CORE_EX list as the library — no more 1,400-exercise dump
   (that was the source of kettlebell spam, 20 duplicate variants, lever/machine dupes,
   and chest lifts filed under triceps). This fetch only builds a name->photo index. */
let FBPAIRS=[],FB_DF={};const FB_BASE="https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/";
const FB_STOP=new Set(["the","a","with","and","to","up","on","of","for","your","version","alternate","exercise"]);
function exToks(s){return (s||"").toLowerCase().replace(/[^a-z0-9 ]+/g," ").split(/\s+/).map(w=>w.replace(/s$/,"")).filter(w=>w.length>=2&&!FB_STOP.has(w));}
function fbW(t){return Math.log(1+(FBPAIRS.length||1)/((FB_DF[t]||0)+1));} // IDF: rare tokens weigh more
// body-part / movement discriminators (singularized). If the app exercise name contains one,
// the matched photo MUST share one — stops "chest press" matching a "calf press".
const FB_MOVE=new Set(["chest","calf","calve","leg","quad","hamstring","glute","ab","abdominal","bicep","tricep","forearm","delt","lateral","shoulder","trap","lat","row","curl","squat","deadlift","lunge","fly","crossover","pulldown","pullover","shrug","crunch","twist","kickback","skullcrusher","pushdown","dip","preacher","hammer","wrist","hip","abduction","adduction","bridge","front","rear"]);
// resolve each exercise to a free-exercise-db photo once, by IDF-weighted token overlap (order-independent)
function resolveImages(){
  if(!FBPAIRS.length)return;
  EXDB.forEach(ex=>{
    if(ex.fb){ex._img=FB_BASE+ex.fb+"/0.jpg";return;}
    const A=[...new Set(exToks(ex.n))];if(A.length<1){ex._img="";return;}
    const As=new Set(A);let Asum=0;A.forEach(t=>Asum+=fbW(t));
    const Amove=A.filter(t=>FB_MOVE.has(t));
    let best=null,bestW=0,bestExtra=999;
    for(const p of FBPAIRS){
      let ov=0,ovW=0,shareMove=false;
      for(const t of p.t)if(As.has(t)){ov++;ovW+=fbW(t);if(FB_MOVE.has(t))shareMove=true;}
      if(ov<2)continue;
      if(Amove.length&&!shareMove)continue; // must share a body-part/movement word
      if(ovW/Asum<0.6)continue;
      const extra=p.t.length-ov;
      if(ovW>bestW||(Math.abs(ovW-bestW)<1e-9&&extra<bestExtra)){best=p;bestW=ovW;bestExtra=extra;}
    }
    ex._img=best?FB_BASE+best.i:"";
  });
  indexEx();
}
function exImg(ex){
  if(!ex)return "";
  if(ex._img!==undefined)return ex._img;
  if(ex.fb)return FB_BASE+ex.fb+"/0.jpg";
  return "";
}

// live=true also counts sets that have reps entered but aren't ticked done yet (in-session nudges).
function countSets(sets,live){return (sets||[]).reduce((a,s)=>{if(!s||s.type==="W")return a;const counts=live?(s.done||parseFloat(s.r)>0):s.done;if(!counts)return a;return a+((s.type==="L"||s.type==="R")?0.5:1);},0);}
function setVolume(ex,s){
  if(!s.done)return 0; const t=s.type||"NRM"; if(t==="W")return 0;
  const load=setLoad(ex,s.w), reps=+s.r||0; let v=load*reps;
  if(t==="L"||t==="R")v*=0.5;

}

/* ========================= SCIENCE-BASED FATIGUE / RECOVERY MODEL =========================
   Fatigue is NOT "trained = red". It accumulates from WORKING sets weighted by proximity to
   failure (RIR) and decays exponentially with a muscle-specific recovery constant. So 1 warmup
   + 1 normal set barely tints a muscle, while 4-6 sets to failure turn it deep red for days.
   Bigger/slower muscles (back, quads, hams, glutes) recover slower than fast ones (delts, arms). */
const MREC={back:66,quads:66,hamstrings:60,glutes:60,chest:48,shoulders:44,traps:40,biceps:38,triceps:38,forearms:34,calves:34,abs:34};
const FATIGUE_REF=6;   // effective hard sets of recent stimulus = fully fatigued (deep red)
const FRESH_PCT=12;    // at/below this fatigue% a muscle is considered fresh/ready
// per-set fatigue contribution: warmups ~0, working sets scaled by how close to failure
function setStim(s){
  if(!s||!s.done)return 0;
  if(s.type==="W")return 0;            // warmup = negligible fatigue
  let prox=1;                          // default normal working set ≈ 2 RIR
  if(s.type==="F")prox=1.5;            // taken to failure
  else if(s.type==="D")prox=1.4;       // drop set
  else if(s.type==="RP")prox=1.5;      // rest-pause — repeated failure
  else if(s.type==="M")prox=1.45;      // myo-reps — near-failure mini-sets
  else{const rpe=+s.rpe; if(rpe>=5&&rpe<=10)prox=0.6+(rpe-5)*0.18;} // RPE5→.6 … RPE10→1.5
  return prox;
}
// live fatigue for a muscle: sum of recent session stimulus, each decayed by exp(-Δt/τ)
function muscleFatigue(m){
  if(!(state.data.muscleVol[m]||0))return{units:0,pct:0,hrs:0};
  const tau=MREC[m]||48, cutoff=now()-7*864e5; let units=0;
  (state.data.workouts||[]).forEach(w=>{
    const t=new Date(w.date).getTime(); if(!t||t<cutoff)return;
    const dt=Math.max(0,(now()-t)/36e5); // hours since this session
    let sStim=0;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name); let raw=0;
      (e.sets||[]).forEach(s=>raw+=setStim(s));
      if(raw<=0)return;
      if(ex.p&&ex.p.includes(m))sStim+=raw;
      else if(ex.s&&ex.s.includes(m))sStim+=raw*0.4;
    });
    if(sStim>0)units+=sStim*Math.exp(-dt/tau);
  });
  const pct=clamp(Math.round(units/FATIGUE_REF*100),0,100);
  let hrs=0; const fl=FATIGUE_REF*FRESH_PCT/100;
  if(units>fl)hrs=Math.max(0,Math.round(tau*Math.log(units/fl)));
  return{units,pct,hrs};
}
// recovery% = inverse of fatigue (kept so existing call sites read high=recovered=green)
function getRecovery(m){
  if(!(state.data.muscleVol[m]||0))return 100;
  return clamp(100-muscleFatigue(m).pct,0,100);
}
function recoveryColor(r){return r>=80?"var(--green)":r>=50?"var(--yellow)":"var(--red)";}
function hoursToReady(m){return muscleFatigue(m).hrs;}

/* ========================= MUSCLE LEVELS ========================= */
// level from cumulative volume (log scale): ~lvl0 at 0, climbs through training
/* Muscle level: a long RPG grind, NOT a sprint. One solid session ≈ level 1.
   Power curve (v/2500)^0.55 so the climb stays gentle early and level 20 (max)
   takes many months of consistent ~2×/week volume (~580k cumulative). */
const MLV_BASE=2500, MLV_EXP=0.55, MLV_INV=1/0.55;
function muscleLevel(m){
  const v=state.data.muscleVol[m]||0; if(v<=0)return 0;
  return clamp(Math.floor(Math.pow(v/MLV_BASE,MLV_EXP)),0,20);
}
function muscleXP(m){const v=state.data.muscleVol[m]||0;const l=muscleLevel(m);
  const lo=MLV_BASE*Math.pow(l,MLV_INV),hi=MLV_BASE*Math.pow(l+1,MLV_INV);
  return{lvl:l,cur:Math.max(0,v-lo),need:Math.max(1,hi-lo),pct:clamp((v-lo)/(hi-lo)*100,0,100)};}
function strengthLevel(){let s=0;M12.forEach(m=>s+=muscleLevel(m));return Math.max(1,Math.round(s/M12.length*1.3));}

/* ========================= WEEKLY SETS PER MUSCLE ========================= */
function weeklySets(m){
  const wk=now()-7*864e5; let c=0;
  state.data.workouts.forEach(w=>{
    if(new Date(w.date).getTime()<wk)return;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name);
      const working=countSets(e.sets,false);
      if(ex.p&&ex.p.includes(m))c+=working;
      if(ex.s&&ex.s.includes(m))c+=working*0.5;
    });
  });
  return Math.round(c);
}
/* ===== Training FREQUENCY per muscle — distinct sessions this week + days since last stimulus.
   Science: each muscle grows best trained ~2× / week (every ~72h). We use that to tell the
   user exactly which muscles to train next and which are already covered. ===== */
function muscleSessionsThisWeek(m){
  const wk=now()-7*864e5, days=new Set();
  (state.data.workouts||[]).forEach(w=>{
    if(new Date(w.date).getTime()<wk)return;
    let hit=false;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name);
      const working=countSets(e.sets,false);
      if(working&&((ex.p&&ex.p.includes(m))||(ex.s&&ex.s.includes(m))))hit=true;});
    if(hit)days.add(new Date(w.date).toDateString());
  });
  return days.size;
}
function muscleLastTrained(m){
  let best=null;
  (state.data.workouts||[]).forEach(w=>{
    let hit=false;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name);
      const working=countSets(e.sets,false);
      if(working&&((ex.p&&ex.p.includes(m))||(ex.s&&ex.s.includes(m))))hit=true;});
    if(hit){const t=new Date(w.date).getTime();if(best===null||t>best)best=t;}
  });
  return best;
}
// Bucket each muscle: "train" (overdue / under-volume), "soon" (due-ish), "ok" (good frequency).
function freqInfo(m){
  const trained=(state.data.muscleVol[m]||0)>0;

  else if(dsl>=4){stat="train";col="var(--red)";note=`${dsl}d since last hit · train it`;}
  else if(sets<mev){stat="train";col="var(--red)";note=`only ${sets} set${sets===1?"":"s"}/wk (under MEV ${mev})`;}
  else if(sess<2||dsl>=3){stat="soon";col="var(--yellow)";note=sess<2?`hit 1× this week — due again`:`${dsl}d ago · due soon`;}
  else{stat="ok";col="var(--green)";note=`${sess}× this week · ${sets} sets — good`;}

}

/* ========================= SUBGROUP VOLUME + COVERAGE COACH =========================
   Per sub-region weekly working sets, and a coach that flags missing angles / stretch-debt.
   Respects the user's rule: 2-3 real sets per region across several exercises is GOOD, not
   junk. We only flag a region as a GAP when its complementary region is trained but it isn't. */
function subSetCounts(m){
  const wk=now()-7*864e5, c={}; (SUBG[m]||[]).forEach(s=>c[s[0]]=0);
  (state.data.workouts||[]).forEach(w=>{
    if(new Date(w.date).getTime()<wk)return;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name);
      const working=countSets(e.sets,false); if(!working)return;
      let w8=0; if(ex.p&&ex.p.includes(m))w8=working; else if(ex.s&&ex.s.includes(m))w8=working*0.5; else return;
      exSub(ex,m).forEach(id=>{if(id in c)c[id]+=w8;});
    });
  });
  Object.keys(c).forEach(k=>c[k]=Math.round(c[k]*10)/10); return c;
}
const COVER_RULES={
  chest:[{need:"up",from:["mid","lo"],tip:"No upper-pec work — your pressing is flat/decline. Add an incline press or low-to-high cable for the clavicular head."}],
  triceps:[{need:"long",from:["lat","med"],tip:"All your triceps work is pushdowns/pressing (lateral & medial heads). The long head — the biggest of the three — only grows from a stretched, overhead position. Add an overhead extension or skullcrusher."}],
  shoulders:[{need:"side",from:["front"],tip:"Plenty of pressing (front delt) but the side delt — what builds shoulder width — is under-trained. Add lateral raises."},
             {need:"rear",from:["front","side"],tip:"Rear delts are lagging behind your pressing. Add a rear-delt fly or face pull for posture and the 3D look."}],
  hamstrings:[{need:"hip",from:["knee"],tip:"Only knee-flexion (leg curls). The long head grows most in the stretched hip-hinge — add a Romanian deadlift."},
              {need:"knee",from:["hip"],tip:"All hip-hinge, no knee-flexion. Add a leg curl to hit the short head the RDL under-loads."}],
  back:[{need:"ulat",from:["llat","mid"],tip:"All horizontal rows, no vertical pull. Add a pulldown or pull-up — a second arm path for the upper lats."},
        {need:"llat",from:["ulat"],tip:"All vertical pulls, no rows. Add a row for the lower lats and mid-back thickness."}],
  quads:[{need:"rec",from:["vas"],tip:"Add a leg extension — the rectus femoris crosses the hip, so squats alone under-load it."}],
  calves:[{need:"sol",from:["gas"],tip:"Add a SEATED calf raise — the bent knee biases the soleus, which standing raises barely reach."},
          {need:"gas",from:["sol"],tip:"Add a STANDING calf raise for the gastrocnemius, the visible calf head."}]
};
function coverageTips(m){
  const c=subSetCounts(m), tips=[]; const trained=id=>(c[id]||0)>=1.5;
  if(!Object.values(c).some(v=>v>=1.5))return tips;
  (COVER_RULES[m]||[]).forEach(r=>{ if(r.from.some(id=>trained(id))&&!trained(r.need))tips.push({type:"gap",text:r.tip,need:r.need}); });
  return tips;
}
// per sub-region fatigue heat (saturates faster than the whole muscle — a single head needs fewer sets)
function subFatigue(m,id){
  const tau=MREC[m]||48, cutoff=now()-7*864e5; let units=0;
  (state.data.workouts||[]).forEach(w=>{const t=new Date(w.date).getTime(); if(!t||t<cutoff)return;
    const dt=Math.max(0,(now()-t)/36e5); let sStim=0;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name);
      const prim=ex.p&&ex.p.includes(m), sec=ex.s&&ex.s.includes(m); if(!prim&&!sec)return;
      if(!exSub(ex,m).includes(id))return;
      let raw=0;(e.sets||[]).forEach(s=>raw+=setStim(s)); if(raw<=0)return;
      sStim+=prim?raw:raw*0.4;
    });
    if(sStim>0)units+=sStim*Math.exp(-dt/tau);
  });
  return clamp(Math.round(units/(FATIGUE_REF*0.6)*100),0,100);
}
// suggest library exercises that train a given sub-region (for the coverage coach)

function liveCheckPR(ei,si){

  if(!s||!s.done||s.type==="W")return null;            // warm-ups never count as PRs
  const ex=exFor(exObj.name);const e1=setE1RM(ex,s);
  if(!e1)return null;
  const committed=(state.data.prs[exObj.name]&&state.data.prs[exObj.name].orm)||0;
  if(e1<=committed+0.01)return null;                    // not a PR
  state.session.liveBest=state.session.liveBest||{};
  state.session.bossed=state.session.bossed||{};
  let fired=null;
  if(e1>(state.session.liveBest[exObj.name]||0)){
    state.session.liveBest[exObj.name]=e1;
    showPRToast(exObj.name,e1,committed,setLoad(ex,s.w),+s.r||0);          // always show the new best

  }

    state.session.bossed[exObj.name]=true;

/* ========================= COMMIT WORKOUT ========================= */
function finishWorkout(){
  if(typeof stopVoice==="function")stopVoice();
  const ses=state.session;const dur=Math.round((now()-ses.startedAt)/1000);
  const done=ses.exercises.map(e=>({name:e.name,sets:(e.sets||[]).filter(s=>s.done&&(s.w!==""||exFor(e.name).bw)&&s.r!=="")})).filter(e=>e.sets.length);
  if(!done.length){appConfirm({title:"No sets logged",body:"You haven't completed any sets. Discard this session?",ok:"Discard",cancel:"Keep going",danger:true}).then(ok=>{if(ok)endSession();});return;}
  let totalVol=0,fails=0,sessFails={},sessVol={},musclesHit={};const prsThis=[];
  done.forEach(e=>{
    const ex=exFor(e.name);let bestORM=0;
    e.sets.forEach(s=>{const v=setVolume(ex,s);totalVol+=v;
      if(s.type==="F"){fails++;}
      const orm=setE1RM(ex,s);if(orm>bestORM)bestORM=orm;
      // muscle volume
      (ex.p||[]).forEach(m=>{sessVol[m]=(sessVol[m]||0)+v;musclesHit[m]=Math.max(musclesHit[m]||0,1);if(s.type==="F")sessFails[m]=(sessFails[m]||0)+1;});
      (ex.s||[]).forEach(m=>{sessVol[m]=(sessVol[m]||0)+v*0.4;musclesHit[m]=Math.max(musclesHit[m]||0,.5);});
    });
    // PR detection on E1RM
    const prev=state.data.prs[e.name];
    if(bestORM>0&&(!prev||bestORM>prev.orm+0.01)){
      const bestSet=e.sets.reduce((a,s)=>setE1RM(ex,s)>setE1RM(ex,a)?s:a,e.sets[0]);
      const improve=prev?((bestORM-prev.orm)/prev.orm*100):0;
      prsThis.push({name:e.name,orm:bestORM,prevOrm:prev?prev.orm:0,improve,first:!prev,w:setLoad(ex,bestSet.w),r:+bestSet.r||0,ex});
      state.data.prs[e.name]={orm:bestORM,w:setLoad(ex,bestSet.w),r:+bestSet.r||0,date:new Date().toISOString(),count:(prev&&prev.count||0)+1};
    }
  });
  // apply muscle state
  const t=new Date().toISOString();
  Object.keys(sessVol).forEach(m=>{state.data.muscleVol[m]=(state.data.muscleVol[m]||0)+sessVol[m];
    if(musclesHit[m]>=1||sessVol[m]>500){state.data.muscleLastTrained[m]=t;state.data.muscleLastVol[m]=sessVol[m];state.data.muscleLastFails[m]=sessFails[m]||0;}});
  // streak
  const u=state.data.u;const today=new Date().toDateString();
  if(u.lastTrainedDate){const d=Math.round(daysSince(u.lastTrainedDate));const ld=new Date(u.lastTrainedDate).toDateString();
    if(ld===today){}else if(d<=1.5){u.streakDays++;}else{u.streakDays=1;}}else u.streakDays=1;
  u.lastTrainedDate=t;
  // totals + xp — paced so levels mean something: capped volume bonus + flat base + PR reward.
  // (Volume is kg×reps and balloons fast, so it's divided hard and capped; PRs and showing up carry the weight.)
  const xpGain=Math.min(Math.round(totalVol/160),55)+prsThis.length*25+20;
  u.totalWorkouts++;u.totalVolume+=totalVol;u.totalDuration+=dur;u.xp+=xpGain;u.failureSets+=fails;
  // weakest muscle for taunt memory
  let weak=M12[0],wl=999;M12.forEach(m=>{const l=muscleLevel(m);if((state.data.muscleVol[m]||0)>0&&l<wl){wl=l;weak=m;}});u.lastMissedMuscle=weak;
  const wk={id:"w"+now(),date:t,name:ses.day,split:ses.split,muscles:Object.keys(musclesHit),exercises:done,xp:xpGain,totalVol:Math.round(totalVol),duration:dur,readiness:ses.readiness,prs:prsThis.map(p=>p.name)};
  state.data.workouts.unshift(wk);
  // boss returns check (defeat comeback if PR beats target)
  checkComebackDefeat(prsThis);
  checkAchievements();
  checkUnlocks();
  // advance the case-file rotation when the session came from a planned split (not a free session)
  if(ses.split&&ses.split!=="Free Session")advanceDay();
  save();
  // store result for summary + boss
  state.lastResult={wk,totalVol,xpGain,prsThis,sessVol,musclesHit,dur,readiness:ses.readiness};
  stopTimers();state.step=null;
  // Bosses now fire live during the session (see liveCheckPR), so just show the summary.
  openSummary();
}
