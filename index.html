function pickBoss(prs){
  if(!prs.length)return null;
  const top=prs.slice().sort((a,b)=>(b.improve||(b.first?9999:0))-(a.improve||(a.first?9999:0)))[0];
  // specials
  if(prs.length>=3)return Object.assign({},{v:"Hush",e:"🩹",c:"#b0b0b0",q:"Tommy Elliot planned everything. So did you. All of it worked."},{pr:top});
  if(state.data.bossWins.length===0&&top.first)return Object.assign({},{v:"Joe Chill",e:"🔫",c:"#6a6a6a",q:"He created Batman by taking everything. You just took a PR."},{pr:top});
  if(top.r&&top.w>=bodyW())return Object.assign({},{v:"Hugo Strange",e:"🧠",c:"#7a5ca8",q:"He studied Batman for years. Your body just studied gravity and won."},{pr:top});
  if(/deadlift/i.test(top.name))return Object.assign({},{v:"Clayface",e:"🪨",c:"#8a6a4a",q:"Shapeshifter meets immovable iron. Iron wins."},{pr:top});
  if((top.ex.p||[]).some(m=>["quads","hamstrings","glutes","calves"].includes(m))&&top.first)return Object.assign({},{v:"Killer Croc",e:"🐊",c:"#4a7a3a",q:"Croc lives underground. Your quads just moved mountains."},{pr:top});
  if(new Date().getDay()===1)return Object.assign({},{v:"Calendar Man",e:"📅",c:"#c98a3a",q:"Julian Day marks every date. Today's date: NEW PR."},{pr:top});
  const imp=top.first?12:top.improve;
  let b=BOSSES[0];for(const x of BOSSES)if(imp>=x.min)b=x;
  return Object.assign({},b,{pr:top});
}

function suggestionFor(name){

// Most recent logged top working set for a lift (scans workout history, newest first).
function lastBestSet(name){
  const ws=state.data.workouts||[];const ex=exFor(name);
  for(const w of ws){
    const e=(w.exercises||[]).find(x=>x.name===name);if(!e)continue;
    let best=null,bv=-1;
    (e.sets||[]).forEach(s=>{if(s.type==="W")return;const reps=+s.r||0;if(!reps)return;const v=setE1RM(ex,s);if(v>=bv){bv=v;best=s;}});
    if(best)return {w:+best.w||0,r:+best.r||0,date:w.date,e1:bv};
  }

// Double-progression coach: read last performance, tell the lifter exactly what to chase.
function nextTarget(name){
  const ex=exFor(name);const lb=lastBestSet(name);
  if(!lb||!lb.r||(!lb.w&&!ex.bw))return null;
  const r=lb.r;let lo,hi;
  if(r<=5){lo=4;hi=6;}else if(r<=9){lo=6;hi=10;}else if(r<=14){lo=10;hi=15;}else{lo=15;hi=20;}
  if(ex.bw){
    if(r<hi)return `last ${r} reps${lb.w?" +"+lb.w+"kg":""} → chase <b>${r+1}+ reps</b>`;
    return `you maxed ${r} reps → <b>add ${lb.w?"2.5kg":"a vest/belt"}</b>, reset to ${lo}`;
  }
  const inc=(r<=6&&lb.w>=60)?5:2.5;
  if(r<hi)return `<b>${lb.w}kg × ${r+1}+</b> — beat last week's reps (aim ${lo}–${hi})`;
  return `maxed ${hi} reps → <b>+${inc}kg to ${fmtNum(lb.w+inc)}kg × ${lo}</b>`;

// Warm-up: only suggested the first time a session touches a given primary muscle.
// Light and short — "feel the movement", not an exhausting ramp. Body is warm after the first lift.
function warmupSuggest(ei){
  const ses=state.session;const e=ses.exercises[ei];const ex=exFor(e.name);
  if(ex.bw)return null;                                   // bodyweight: no load ramp needed
  if((e.sets||[]).some(s=>s.type==="W"))return null;      // already has warm-ups
  if(ses.warmDismiss&&ses.warmDismiss[e.name])return null;// user skipped it
  const prim=ex.p||[];
  const warmed=new Set();
  for(let i=0;i<ei;i++){(exFor(ses.exercises[i].name).p||[]).forEach(m=>warmed.add(m));}
  const fresh=prim.filter(m=>!warmed.has(m));
  if(!fresh.length)return null;                           // muscle already warm this session
  // working weight: first real set entered, else last best
  let W=0;for(const s of e.sets){if(s.type!=="W"&&+s.w>0){W=+s.w;break;}}
  if(!W)W=suggestionFor(e.name)||0;

  const round=x=>Math.max(0,Math.round(x/2.5)*2.5);

  const scheme=ei===0?[[0.4,8],[0.6,5],[0.8,3]]:[[0.5,6],[0.75,3]];
  const sets=scheme.map(([p,r])=>({w:round(W*p),r}));

function sessionVolNotes(){

  state.session.exercises.forEach(e=>{
    const ex=exFor(e.name);
    const working=countSets(e.sets,true);
    if(!working)return;
    (ex.p||[]).forEach(m=>{
      perM[m]=(perM[m]||0)+working;
      perSub[m]=perSub[m]||{};
      const subs=exSub(ex,m);
      if(subs&&subs.length){const share=working/subs.length;subs.forEach(id=>{perSub[m][id]=(perSub[m][id]||0)+share;});}

const NUMW={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fourty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90};
function wordsToNums(t){
  const words=t.replace(/[^a-z0-9.\s-]/g," ").split(/[\s-]+/).filter(Boolean);
  const out=[];let i=0;
  while(i<words.length){
    let w=words[i];
    if(NUMW[w]!=null){
      let val=NUMW[w];
      if(val>=20&&val%10===0&&NUMW[words[i+1]]!=null&&NUMW[words[i+1]]<10){val+=NUMW[words[i+1]];i++;}
      if(words[i+1]==="hundred"){val*=100;i++;if(NUMW[words[i+1]]!=null){val+=NUMW[words[i+1]];i++;}}
      out.push(String(val));
    }else if(w==="hundred"){out.push("100");}
    else out.push(w);
    i++;
  }
  return out.join(" ");
}

  return "";

function cxSyncInputs(){
  const n=$("cx-name");if(n)state.cxDraft.n=n.value;
  const c=$("cx-cues");if(c)state.cxDraft.c=c.value.split(/\n+/).map(x=>x.trim()).filter(Boolean).slice(0,4);

function cxToggleMuscle(which,m){
  cxSyncInputs();const d=state.cxDraft;const other=which==="p"?"s":"p";

function cxSetEq(eq){cxSyncInputs();state.cxDraft.eq=eq;renderCustomCreator();}
function cxToggleBw(){cxSyncInputs();state.cxDraft.bw=state.cxDraft.bw?0:1;renderCustomCreator();}
function renderCustomCreator(){

function closeCustomCreator(){const m=state.cxReturnMulti;state.cxReturnMulti=null;openPicker(m);}
function saveCustomEx(){
  cxSyncInputs();const d=state.cxDraft;
  const name=(d.n||"").trim();
  if(!name){toast&&toast("Give it a name first");return;}
  if(!d.p.length){toast&&toast("Pick at least one primary muscle");return;}
  if(EXBYNAME[name.toLowerCase()]){toast&&toast("That name already exists");return;}
  const ex={n:name,id:"cx"+Date.now().toString(36),eq:d.eq||"other",p:d.p.slice(),s:d.s.slice(),c:(d.c||[]).slice(),custom:1};
  if(d.bw)ex.bw=1;
  if(!Array.isArray(state.data.customEx))state.data.customEx=[];
  state.data.customEx.push(ex);
  mergeCustomEx();save();
  toast&&toast("“"+name+"” added to your library");
  const m=state.cxReturnMulti;state.cxReturnMulti=null;state.cxDraft=null;
  openPicker(m);
}
// exercises already in the split-day being edited (multi-add highlight)
function pickerAddedList(){if(!state.pickerMulti)return null;const s=state.data.splits.find(x=>x.id===state.pickerMulti.id);return (s&&s.days[state.pickerMulti.i])?s.days[state.pickerMulti.i].exercises:[];}
function finishMultiAdd(){state.pickerMulti=null;closeSheet();render();}
function pickMuscle(m){state.pickerMuscle=m;document.querySelectorAll("#ex-musc .chip").forEach(c=>c.classList.toggle("on",c.dataset.m===m));updateExList();}
function updateExList(){
  const q=($("ex-search")?$("ex-search").value:"").toLowerCase().trim();
  state.pickerQuery=q;
  let list=EXDB;
  if(state.pickerMuscle!=="all")list=list.filter(e=>(e.p||[]).includes(state.pickerMuscle));
  if(state.gymFilter&&state.data.u.gym&&state.data.u.gym.equip)list=list.filter(e=>gymAllows(e.eq));
  if(q)list=list.filter(e=>e.n.toLowerCase().includes(q));
  // Cap only the unfiltered "all" view (perf); when a muscle filter or search is active, show every match so new exercises at the end of the list are never hidden.
  if(state.pickerMuscle==="all"&&!q)list=list.slice(0,120);
  const el=$("ex-list");if(!el)return;
  const st=el.scrollTop;                       // preserve scroll so the list doesn't jump on each add
  const added=pickerAddedList();
  el.innerHTML=list.length?list.map(e=>{const on=added&&added.includes(e.n);return `<div class="exrow${on?' added':''}" onclick="pickAdd('${e.n.replace(/'/g,"\\'")}')">
    ${thumb(e)}
    <div class="g"><div class="exname">${esc(e.n)}</div><div class="exmeta">${(e.p||[]).map(m=>MNAME[m]).join(" · ")} · ${esc(e.eq)}</div></div>
    <span style="font-size:22px;color:${on?'var(--green)':'var(--gold2)'}">${on?'✓':'＋'}</span></div>`;}).join(""):`<p class="muted center" style="padding:24px">No exercises match "${esc(q)}".</p>`;
  el.scrollTop=st;
  const cnt=$("picker-cnt");if(cnt&&added)cnt.textContent=added.length?`· ${added.length}`:"";
}

/* ========================= PLATE CALCULATOR (bottom sheet during logging) ========================= */
function openPlateSheet(ei){
  const bar=state.data.u.barWeight||20;
  const calc=(target)=>{
    let per=(target-bar)/2;if(per<0)per=0;const plates=state.data.plates.slice().sort((a,b)=>b-a);const used=[];
    plates.forEach(p=>{while(per>=p-1e-9){used.push(p);per-=p;}});
    return used;
  };
  const colors={25:"#e8453c",20:"#3c8ce8",15:"#e8c53c",10:"#2ecc71",5:"#f0ead6","2.5":"#9c5ce8","1.25":"#9a8f7a"};
  // To-scale loaded-barbell graphic: plates mirror both sleeves, height ∝ weight, real plate colours.
  const barSVG=(used)=>{
    const H=96,cy=H/2,sleeve=26,W=300,cx=W/2;
    const ph=p=>26+p*1.55;               // 25kg→64.75, 1.25→27.9
    const pw=p=>p>=20?12:p>=10?10:p>=5?8:6;
    let gap=2,xR=cx+sleeve,xL=cx-sleeve,plates="";
    used.forEach(p=>{
      const h=ph(p),w=pw(p),col=colors[p]||"#888";
      plates+=`<rect x="${xR}" y="${cy-h/2}" width="${w}" height="${h}" rx="2.5" fill="${col}" stroke="#05080c" stroke-opacity=".55" stroke-width="1"/>`;
      plates+=`<rect x="${xL-w}" y="${cy-h/2}" width="${w}" height="${h}" rx="2.5" fill="${col}" stroke="#05080c" stroke-opacity=".55" stroke-width="1"/>`;
      xR+=w+gap;xL-=w+gap;
    });
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
      <defs><linearGradient id="barSteel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#aeb6c2"/><stop offset=".5" stop-color="#7b828f"/><stop offset="1" stop-color="#4c525c"/></linearGradient></defs>
      <rect x="20" y="${cy-3}" width="${W-40}" height="6" rx="3" fill="url(#barSteel)"/>
      <rect x="${cx-sleeve}" y="${cy-7}" width="${sleeve*2}" height="14" rx="3" fill="url(#barSteel)"/>
      <rect x="${cx-1}" y="${cy-9}" width="2" height="18" fill="#2a2f3a"/>
      ${plates}</svg>`;
  };
  const render3=(target)=>{
    const used=calc(target);const leftover=Math.max(0,(target-bar)/2-used.reduce((a,b)=>a+b,0));
    $("sheet").querySelector("#plate-out").innerHTML=used.length?
      `<div class="stage" style="border-radius:14px;padding:14px 10px 10px;margin:10px 0">${barSVG(used)}</div>
       <div class="row wrap" style="justify-content:center;gap:5px;margin:4px 0">${used.map(p=>`<span style="background:${colors[p]||'#888'};color:#000;font-weight:700;font-size:12px;padding:5px 8px;border-radius:5px;box-shadow:0 2px 8px -2px rgba(0,0,0,.6)">${p}</span>`).join("")}</div>
       <div class="mini center">Per side · bar ${bar}kg · <b class="gold">total ${(bar+used.reduce((a,b)=>a+b,0)*2)}kg</b>${leftover>0?` · <span style="color:#e8a52a">${leftover.toFixed(2)}kg/side short — micro-plates needed</span>`:""}</div>`
      :`<p class="muted center" style="margin:14px 10px">Just the bar (${bar}kg) — or set a higher target.</p>`;
  };
  $("sheet").innerHTML=`<div class="ttl" style="display:flex;align-items:center">${secIcon('plate')}Plate calculator</div>
    <input id="plate-target" inputmode="decimal" placeholder="Target total weight (kg)" oninput="window._plate(this.value)"/>
    <div id="plate-out"></div>
    <button class="btn" style="margin-top:8px" onclick="closeSheet()">Close</button>`;
  window._plate=(v)=>render3(+v||0);
  $("sheet").classList.add("on");$("sheetbg").classList.add("on");render3(0);
}

/* ========================= WORKOUT SUMMARY (4 cards) ========================= */
function batCompare(v){return v<500?"a Gotham City dumpster full of evidence":v<1000?"a Batcycle with full gear":v<2500?"one full Batmobile":v<5000?"the Bat-Tank":v<10000?"Wayne Manor's main vault":v<25000?"the entire Batcave's equipment":"the Batcave filled twice over";}
// Previous time this exact lift was logged (skips the just-finished session at workouts[0]).
function prevExercise(name){
  const ws=state.data.workouts||[];
  for(let i=1;i<ws.length;i++){const e=(ws[i].exercises||[]).find(x=>x.name===name);if(!e)continue;const ex=exFor(name);let bo=0,bw=0,br=0;(e.sets||[]).forEach(s=>{if(s.type==="W")return;const o=setE1RM(ex,s);if(o>bo){bo=o;bw=setLoad(ex,s.w);br=+s.r||0;}});if(bo>0)return {e1:bo,w:bw,r:br,date:ws[i].date};}
  return null;
}
// Previous workout sharing this session's name (e.g. last "Chest Day") for total-volume comparison.
function prevSameDay(wk){const ws=state.data.workouts||[];for(let i=1;i<ws.length;i++){if(ws[i].name===wk.name&&ws[i].totalVol)return ws[i];}return null;}
function summaryCardRecap(R){
  const rows=R.wk.exercises.map(e=>{
    const ex=exFor(e.name);let topW=0,topR=0,bestO=0,vol=0;
    e.sets.forEach(s=>{vol+=setVolume(ex,s);const o=setE1RM(ex,s);if(o>bestO){bestO=o;topW=setLoad(ex,s.w);topR=+s.r||0;}});
    const prev=prevExercise(e.name);let delta;
    if(prev&&prev.e1>0&&bestO>0){const dp=bestO-prev.e1,up=dp>0.5,dn=dp<-0.5;delta=`<span style="color:${up?'var(--green)':dn?'#e8453c':'var(--text3)'};font-size:12px;font-weight:600">${up?'▲':dn?'▼':'='} ${dp>0?'+':''}${Math.round(dp)}kg</span>`;}
    else delta=`<span class="mini" style="color:var(--gold2)">★ first time</span>`;
    return `<div style="padding:9px 0;border-top:1px solid var(--border)">
      <div class="row sp"><b style="font-size:14px">${esc(e.name)}</b>${delta}</div>
      <div class="row sp mini" style="margin-top:3px;color:var(--text2)"><span>Top: ${Math.round(topW)}kg × ${topR}</span><span>${e.sets.length} sets · ${fmtNum(Math.round(vol))}kg</span></div></div>`;
  }).join("");
  return `<div class="tag center">Exercise breakdown</div><h1 style="font-size:34px;text-align:center;color:var(--gold2);margin-bottom:10px">LIFT BY LIFT</h1>
    <div class="card">${rows}</div>
    <div class="mini center" style="color:var(--text3)">▲ = beat your last estimated 1RM on that lift.</div>`;
}
function sessionNoteBlock(R){
  const wk=R.wk;const feel=wk.feel||"";

    <div class="hr"></div>

function summaryCard3(R){
  let bestSet=null,bestORM=0,rpeSum=0,rpeN=0;

/* ========================= BATSUIT SVG (front + back, anatomical) ========================= */
function dim(lvl,base,max){return base+clamp(lvl/15,0,1)*(max-base);}
function rcHex(r){return r>=80?"#2ECC71":r>=50?"#E8C53C":"#E8453C";}
function suitColor(m){if(!(state.data.muscleVol[m]||0))return null;return rcHex(getRecovery(m));}
// Shared suit defs: 3D shading gradients + a soft bloom for worked muscles. Injected into every suit body.
const SUIT_DEFS=`<defs>`
  +`<linearGradient id="sOcc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset=".6" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity=".34"/></linearGradient>`
  +`<radialGradient id="sGloss" cx="34%" cy="22%" r="80%"><stop offset="0" stop-color="#fff" stop-opacity=".28"/><stop offset=".5" stop-color="#fff" stop-opacity=".05"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>`
  +`<filter id="suitGlow" x="-45%" y="-45%" width="190%" height="190%"><feGaussianBlur stdDeviation="3.2" result="b"/><feComponentTransfer in="b" result="bd"><feFuncA type="linear" slope="0.7"/></feComponentTransfer><feMerge><feMergeNode in="bd"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`
  +`</defs>`;
function reg(m,d,extra){
  // _figColor override lets the same anatomy be recoloured for non-recovery views (e.g. a day's target map)
  const fc=state._figColor?state._figColor(m):null;
  const c=fc?null:suitColor(m);
  const lit=fc?fc.op>=0.4:!!c;
  const fAttr=(state._figGlow&&lit)?' filter="url(#suitGlow)"':'';
  const shade=state._figShade?`<path d="${d}" fill="url(#sOcc)" style="pointer-events:none"/><path d="${d}" fill="url(#sGloss)" style="pointer-events:none"/>`:'';
  if(fc){
    return `<path d="${d}" fill="${fc.fill}" fill-opacity="${fc.op}" stroke="#05080c" stroke-opacity=".5" stroke-width="1.1" stroke-linejoin="round"${fAttr} style="pointer-events:none"/>${shade}`;}
  const fill=c||"#E8C56A";const op=c?".92":".08";
  return `<path d="${d}" fill="${fill}" fill-opacity="${op}" stroke="#05080c" stroke-opacity=".5" stroke-width="1.1" stroke-linejoin="round"${fAttr} onclick="muscleDrill('${m}')" style="cursor:pointer" ${extra||""}/>${shade}`;
}
function suitProps(){
  const sl=clamp(M12.reduce((a,m)=>a+muscleLevel(m),0)/M12.length,0,15);

    neck:dim(sl,9.5,12.5), sh:dim(sl,43,60), pec:dim(sl,30,42), waist:dim(sl,18,23.5), hip:dim(sl,23,29),

function setSuitView(v){state.suitView=v;render();}
function headShape(cx){

// Shared geometry builders parameterised on cx — same math, different centre point

  const S=P.sh,PE=P.pec,W=P.waist,H=P.hip,TH=P.th,CF=P.cf,NK=P.neck;

  const armBk=s=>`M${cx+s*(PE-2)} 104 Q${cx+s*(S+3)} 104 ${cx+s*(S)} 132 L${cx+s*(S-2)} 176 Q${cx+s*(S-3)} 202 ${cx+s*(S-6)} 230 Q${cx+s*(S-9)} 235 ${cx+s*(S-12)} 230 Q${cx+s*(S-10)} 200 ${cx+s*(S-9)} 176 L${cx+s*(S-9)} 134 Q${cx+s*(S-9)} 112 ${cx+s*(PE-6)} 108 Z`;

  const base=`<path d="${torso}" fill="${body}"/><path d="${armBk(-1)}" fill="${body}"/><path d="${armBk(1)}" fill="${body}"/><path d="${legBk(-1)}" fill="${body}"/><path d="${legBk(1)}" fill="${body}"/>`;
  const nk=`<path d="M${cx-NK} 86 Q${cx} 94 ${cx+NK} 86 L${cx+NK-1} 103 Q${cx} 107 ${cx-NK+1} 103 Z" fill="${body}"/>`;
  const ua=s=>`M${cx+s*(S-12)} 116 Q${cx+s*(S+1)} 116 ${cx+s*(S-1)} 134 Q${cx+s*(S-2)} 158 ${cx+s*(S-4)} 172 Q${cx+s*(S-8)} 175 ${cx+s*(S-12)} 170 Q${cx+s*(S-13)} 142 ${cx+s*(S-12)} 116 Z`;

  const cf=s=>`M${cx+s*3} 330 Q${cx+s*(P.cf+3)} 337 ${cx+s*(P.cf)} 360 Q${cx+s*(P.cf-3)} 382 ${cx+s*4} 388 Q${cx+s*3.5} 357 ${cx+s*3} 330 Z`;
  const belt=`<rect x="${cx-W-2}" y="208" width="${(W+2)*2}" height="11" rx="3" fill="#C9A84C" fill-opacity=".55"/><rect x="${cx-7}" y="208" width="14" height="11" rx="2" fill="#E8C56A" fill-opacity=".85"/>`;
  return {base,nk,ua,fa,cf,belt};
}
function _frontBody(cx, P) {

/* ========================= PER-DAY TARGET FIGURES (split images) =========================
   Each training day shows a muscle silhouette lit with the muscles it trains — small in the
   list, large on the day briefing. "View things different ways." Reuses the suit anatomy. */
const FRONT_MUSCLES=new Set(["chest","abs","quads","biceps"]);   // clearly front-dominant
const BACK_MUSCLES=new Set(["back","traps","triceps","glutes","hamstrings"]); // clearly back-dominant
function dayMuscles(day){
  const prim={},sec={};
  (day.exercises||[]).forEach(n=>{const ex=exFor(n);
    (ex.p||[]).forEach(m=>prim[m]=(prim[m]||0)+1);
    (ex.s||[]).forEach(m=>{if(!(ex.p||[]).includes(m))sec[m]=(sec[m]||0)+1;});});
  return {prim,sec};
}
function _dayColorFn(prim,sec){return (m)=> prim[m]?{fill:"#E8453C",op:".95"} : sec[m]?{fill:"#E8C56A",op:".5"} : {fill:"#E8C56A",op:".06"};}
// dominant side for a compact single-body thumbnail
function dayDominantSide(prim){let f=0,b=0;Object.keys(prim).forEach(m=>{if(FRONT_MUSCLES.has(m))f++;else if(BACK_MUSCLES.has(m))b++;});return b>f?"back":"front";}
// small list thumbnail — one body, dominant side
function dayThumb(day){
  if(isRest(day))return `<span class="exwrap"><svg viewBox="0 0 100 100" style="width:100%;height:100%">${restGlyph(50,50,2.7,'#7c6a3a')}</svg></span>`;
  const {prim,sec}=dayMuscles(day);const side=dayDominantSide(prim);
  const prev=state._figColor;state._figColor=_dayColorFn(prim,sec);
  const P=suitProps();const body=side==="back"?_backBody(125,P):_frontBody(125,P);
  state._figColor=prev;
  return `<span class="exwrap"><svg viewBox="58 40 134 380" style="width:100%;height:100%;display:block">${body}</svg></span>`;
}
// large briefing heatmap — full front + back
function dayHeatFigure(day){
  const {prim,sec}=dayMuscles(day);
  const prev=state._figColor;state._figColor=_dayColorFn(prim,sec);
  const P=suitProps();
  const lbl=(cx,t)=>`<text x="${cx}" y="22" text-anchor="middle" font-family="Bebas Neue,sans-serif" font-size="12" letter-spacing="3" fill="#6B5420">${t}</text>`;
  const div=`<line x1="250" y1="12" x2="250" y2="418" stroke="#2A2520" stroke-width="1" stroke-dasharray="4,4"/>`;
  const svg=`<svg viewBox="0 0 500 430" style="height:232px;width:auto;max-width:100%;display:block;margin:0 auto">${lbl(125,"FRONT")}${lbl(375,"BACK")}${div}${_frontBody(125,P)}${_backBody(375,P)}</svg>`;
  state._figColor=prev;
  return svg;
}
function openDayBriefing(splitId,dayIdx){

/* ===== Wave K — Symmetry score + measurement trends ===== */
function symmetryScore(){
  const me=state.data.u.measurements;
  const pairs=[["leftArm","rightArm","Arms"],["leftThigh","rightThigh","Thighs"]];
  const got=pairs.filter(p=>me[p[0]]&&me[p[1]]).map(([l,r,name])=>{
    const a=+me[l],b=+me[r],big=Math.max(a,b)||1,diff=Math.abs(a-b);
    return {name,l:a,r:b,diff:Math.round(diff*10)/10,pct:Math.round(diff/big*1000)/10,
      sym:Math.round(clamp(100-(diff/big*100)*4,0,100)),side:a>b?"left":a<b?"right":"even"};
  });
  if(!got.length)return null;
  return {rows:got,overall:Math.round(got.reduce((s,r)=>s+r.sym,0)/got.length)};
}
function symmetryCard(){
  const s=symmetryScore();

  if(!s&&hist.length<2)return "";

  if(s){
    const col=s.overall>=90?"var(--green)":s.overall>=78?"var(--gold2)":"var(--orange)";
    const lbl=s.overall>=90?"BALANCED":s.overall>=78?"MINOR LEAN":"WORTH WATCHING";
    html+=`<div class="row sp" style="align-items:flex-end;margin-bottom:9px"><div><div class="mini" style="text-transform:uppercase;letter-spacing:.12em;color:var(--text3)">Left / right symmetry</div><div style="font-family:var(--disp);font-size:30px;color:${col};line-height:1.05">${s.overall}<span style="font-size:14px;color:var(--text3)">/100</span></div></div><div style="font-family:var(--disp);font-size:15px;color:${col}">${lbl}</div></div>`;
    s.rows.forEach(r=>{

function addProgress(input){

    const im=new Image();

      const max=820,sc=Math.min(1,max/Math.max(im.width,im.height));
      const cw=Math.round(im.width*sc),ch=Math.round(im.height*sc);

      cv.getContext("2d").drawImage(im,0,0,cw,ch);

function trendChart(vals,opts){
  opts=opts||{};const w=320,h=120,pl=28,pr=6,pt=10,pb=14;
  if(!vals||!vals.length)return '<div class="mini muted" style="padding:14px 0;text-align:center">No data yet.</div>';
  if(vals.length===1)return `<div class="mini" style="text-align:center;padding:14px 0">One data point so far: <b class="gold">${vals[0]}${opts.unit||""}</b>. Log it again to draw the curve.</div>`;
  const min=Math.min(...vals),max=Math.max(...vals),range=(max-min)||1,n=vals.length,col=opts.color||"#E8C56A";
  const X=i=>pl+(i/(n-1))*(w-pl-pr), Y=v=>pt+(1-(v-min)/range)*(h-pt-pb);
  const line=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const area=`${X(0).toFixed(1)},${(h-pb).toFixed(1)} ${line} ${X(n-1).toFixed(1)},${(h-pb).toFixed(1)}`;
  const dots=vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="${i===n-1?3.4:2}" fill="${col}"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
    <line x1="${pl}" y1="${Y(max).toFixed(1)}" x2="${w-pr}" y2="${Y(max).toFixed(1)}" stroke="#242424"/>
    <line x1="${pl}" y1="${Y(min).toFixed(1)}" x2="${w-pr}" y2="${Y(min).toFixed(1)}" stroke="#242424"/>
    <text x="2" y="${(Y(max)+3).toFixed(1)}" font-size="9" fill="#8a8a8a">${Math.round(max)}</text>
    <text x="2" y="${(Y(min)+3).toFixed(1)}" font-size="9" fill="#8a8a8a">${Math.round(min)}</text>
    <polyline points="${area}" fill="${col}" fill-opacity="0.09" stroke="none"/>

function strengthIndexSeries(){
  const names=loggedExerciseNames().slice(0,8);
  const events=[];                                  // {t, name, e1rm}
  names.forEach(n=>exerciseRows(n).forEach(r=>events.push({t:new Date(r.date).getTime(),name:n,e1rm:r.e1rm})));
  if(events.length<2)return {vals:[],labels:[]};
  events.sort((a,b)=>a.t-b.t);
  const best={};const vals=[],labels=[];let lastT=0;
  events.forEach(e=>{best[e.name]=Math.max(best[e.name]||0,e.e1rm);
    const sum=Object.values(best).reduce((a,b)=>a+b,0);
    if(e.t!==lastT){vals.push(Math.round(sum));labels.push(e.t);lastT=e.t;}
    else vals[vals.length-1]=Math.round(sum);});
  return {vals,labels};
}
function strengthForecast(){
  const out=[];
  loggedExerciseNames().forEach(n=>{
    const rows=exerciseRows(n);if(rows.length<3)return;
    const recent=rows.slice(-4);
    const t0=new Date(recent[0].date).getTime(),t1=new Date(recent[recent.length-1].date).getTime();
    const dd=(t1-t0)/864e5;if(dd<=0)return;
    const slope=(recent[recent.length-1].e1rm-recent[0].e1rm)/dd; // kg/day
    const cur=rows[rows.length-1].e1rm;const nextMilestone=Math.ceil((cur+0.5)/5)*5;
    if(slope<=0.01){out.push({n,cur,target:nextMilestone,days:null});return;}
    const days=Math.ceil((nextMilestone-cur)/slope);
    if(days>0&&days<400)out.push({n,cur,target:nextMilestone,days,slope});
  });
  return out.filter(o=>o.days).sort((a,b)=>a.days-b.days).slice(0,5);
}
function ironEfficiency(){
  const out=[];
  loggedExerciseNames().forEach(n=>{
    const rows=exerciseRows(n);if(rows.length<2)return;
    const gain=rows[rows.length-1].e1rm-rows[0].e1rm;
    const perSession=gain/(rows.length-1);
    out.push({n,gain,perSession,sessions:rows.length});
  });
  return out.sort((a,b)=>b.perSession-a.perSession);
}

function consecutiveDays(){

// Gotham Threat Level — city danger from training consistency
function gothamThreat(){
  const d=state.data;
  if(!d.workouts.length)return {score:55,level:"UNKNOWN",color:"var(--text2)",desc:"No patrols logged. Gotham waits to see who you are."};
  const dsl=d.u.lastTrainedDate?daysSince(d.u.lastTrainedDate):14;
  const wc=weekCount(),goal=d.u.weeklyGoal||4,streak=d.u.streakDays||0;
  let s=dsl*8+Math.max(0,goal-wc)*7-streak*1.2-(wc>=goal?12:0);

/* ===== Wave 11 — THE CAVE: injury-risk workload ratio (ACWR) =====
   Acute:Chronic Workload Ratio — this week's training load vs the rolling 4-week average.
   A genuine sports-science marker: sudden load spikes (ratio >1.5) are the strongest
   modifiable predictor of soft-tissue injury; 0.8–1.3 is the "sweet spot". Load = tonnage. */
function weeklyLoad(weekIdx){
  const e=now()-weekIdx*7*864e5, s=e-7*864e5;
  return (state.data.workouts||[]).filter(w=>{const t=new Date(w.date).getTime();return t>=s&&t<e;}).reduce((a,w)=>a+(w.totalVol||0),0);
}
function acwrInfo(){
  const acute=weeklyLoad(0);
  const chronic=(weeklyLoad(0)+weeklyLoad(1)+weeklyLoad(2)+weeklyLoad(3))/4;
  const ratio=chronic>0?acute/chronic:0;
  let zone,col,msg;
  if(chronic<=0||(state.data.workouts||[]).length<3){zone="building";col="var(--text3)";msg="A couple more weeks of logging and your workload ratio comes online.";}
  else if(ratio>1.5){zone="spike";col="var(--red)";msg="Load is spiking well above your 4-week norm — the sharpest injury-risk window. Hold volume here; don't add more this week.";}
  else if(ratio>1.3){zone="high";col="var(--orange)";msg="Climbing fast. Fine for one planned overload week, but don't stack another jump on top of it.";}
  else if(ratio>=0.8){zone="sweet";col="var(--green)";msg="In the sweet spot (0.8–1.3). Load is progressing at a tissue-safe rate — keep nudging it.";}
  else{zone="detrain";col="var(--gold2)";msg="Below 0.8 — you're coasting / detraining slightly. Room to add work and rebuild momentum.";}
  return {acute:Math.round(acute),chronic:Math.round(chronic),ratio,zone,col,msg};
}

function weekCount(){const wk=now()-7*864e5;return new Set(state.data.workouts.filter(w=>new Date(w.date).getTime()>=wk).map(w=>new Date(w.date).toDateString())).size;}
function avgWeekVol(){const wk=now()-7*864e5;const ws=state.data.workouts.filter(w=>new Date(w.date).getTime()>=wk);return ws.length?ws.reduce((a,w)=>a+w.totalVol,0)/ws.length:0;}

function sparkline(){
  const weeks=8;const vals=[];for(let i=weeks-1;i>=0;i--){const s=now()-(i+1)*7*864e5,e=now()-i*7*864e5;vals.push(state.data.workouts.filter(w=>{const t=new Date(w.date).getTime();return t>=s&&t<e;}).reduce((a,w)=>a+w.totalVol,0));}
  const mx=Math.max(1,...vals);const up=vals[vals.length-1]>=vals[0];
  return `<div class="spark" style="margin-top:8px">${vals.map(v=>`<i style="height:${clamp(v/mx*100,4,100)}%;background:${up?'var(--gold-dim)':'var(--red)'}"></i>`).join("")}</div>`;

// Progressive overload: per completed exercise, what to do next time, from RIR/RPE + completion.
function overloadSuggestions(wk){
  const metric=state.data.u.metric;const out=[];
  (wk.exercises||[]).forEach(e=>{
    const ex=exFor(e.name);
    const working=(e.sets||[]).filter(s=>s.done&&s.type!=="W"&&+s.r>0);
    if(!working.length)return;
    const rirs=working.map(s=>{const v=parseFloat(s.rpe);if(isNaN(v))return null;return metric==="rir"?v:(10-v);}).filter(v=>v!=null);
    const topW=Math.max(...working.map(s=>+s.w||0));
    const inc=ex.bw?"add reps, then add load":"+2.5kg";
    let text,tone;
    if(!rirs.length){text=`Add a rep on each set; once you top your range, go ${ex.bw?"weighted":"+2.5kg"}. (Log RIR for sharper calls.)`;tone="info";}
    else{const avg=rirs.reduce((a,b)=>a+b,0)/rirs.length;
      if(avg>2){text=`All sets left ${avg.toFixed(0)}+ in reserve — add load next time (${inc}).`;tone="up";}
      else if(avg<=1){text=`Near failure (RIR ${avg.toFixed(1)}). Hold ${topW}kg, chase +1–2 reps before adding weight.`;tone="hold";}
      else{text=`RIR ~2, the effective dose. Repeat ${topW}kg and add a rep where it's clean.`;tone="ok";}}
    out.push({name:e.name,text,tone});
  });
  return out;
}
function overloadIntel(){  const out=[];const seen=new Set();
  for(const w of state.data.workouts.slice(0,3)){for(const e of w.exercises){if(seen.has(e.name)||out.length>=4)continue;const pr=state.data.prs[e.name];if(!pr)continue;seen.add(e.name);
    out.push({name:e.name,text:`try ${Math.round(pr.w)}kg×${pr.r} → +1 rep`});}}
  return out;
}

// Plateau breaker: per-lift e1RM history; flag lifts with no new best across their last 3 outings (≥10d span).
function plateauCard(){
  const ws=(state.data.workouts||[]);if(ws.length<4)return "";
  const byEx={};
  for(let i=ws.length-1;i>=0;i--){const w=ws[i];const ex0=w.date;
    (w.exercises||[]).forEach(e=>{const ex=exFor(e.name);let best=0;
      (e.sets||[]).forEach(s=>{if(s.type==="W")return;const v=setE1RM(ex,s);if(v>best)best=v;});
      if(best>0)(byEx[e.name]=byEx[e.name]||[]).push({date:ex0,e1:best});});
  }
  const PROTO=["Back off ~10% and rebuild over 2 weeks — fresh runway beats grinding.","Add one extra working set — drive the weekly volume up a notch.","Switch rep range: go heavier for 4–6 reps and let the nervous system adapt.","Reset the weight, then add a single rep every set until you own the top of the range.","Slow the eccentric to a 3-count — more tension, new stimulus at the same load."];
  const stalled=[];
  Object.keys(byEx).forEach(name=>{const arr=byEx[name];if(arr.length<4)return;
    const last3=arr.slice(-3),prior=arr.slice(0,-3);
    const recentPeak=Math.max(...last3.map(a=>a.e1)),priorPeak=Math.max(...prior.map(a=>a.e1));
    const span=(new Date(last3[last3.length-1].date)-new Date(last3[0].date))/86400000;
    if(recentPeak<=priorPeak*1.005&&span>=10){
      stalled.push({name,e1:Math.round(recentPeak),weeks:Math.round(span/7),idx:stalled.length});}
  });
  if(!stalled.length)return "";
  stalled.sort((a,b)=>b.e1-a.e1);
  let h=`<div class="card" style="border-color:rgba(232,69,60,.4);background:linear-gradient(180deg,rgba(232,69,60,.07),transparent)"><div class="ttl" style="color:#ff6b5c;display:flex;align-items:center">${secIcon('plateau','#ff6b5c')}Plateau breaker</div><div class="mini" style="margin-bottom:10px;color:var(--text2)">These lifts haven't set a new estimated 1RM in a while. Time to change the stimulus.</div>`;
  stalled.slice(0,3).forEach((s,k)=>{h+=`<div style="border-top:1px solid var(--border);padding:9px 0">
    <div class="row sp"><b>${esc(s.name)}</b><span class="chip" style="font-size:11px">stuck ~${s.weeks||1}w · ${s.e1}kg</span></div>
    <div class="mini" style="margin-top:5px;color:var(--gold2);line-height:1.45">🔓 ${PROTO[k%PROTO.length]}</div></div>`;});
  h+=`</div>`;return h;
}
/* ===== Wave J — Sports Science Lab: junk-volume detector + stimulus-to-fatigue (SFR) ratings ===== */
// Aggregate each exercise's effective hard-set stimulus over the last N days.
function recentExerciseStim(days){
  const cut=now()-days*864e5,agg={};
  (state.data.workouts||[]).forEach(w=>{
    if(new Date(w.date).getTime()<cut)return;
    (w.exercises||[]).forEach(e=>{
      const working=(e.sets||[]).filter(s=>s.done&&s.type!=="W");
      if(!working.length)return;
      const a=agg[e.name]||(agg[e.name]={name:e.name,sets:0,stim:0,ex:exFor(e.name)});
      a.sets+=working.length; a.stim+=working.reduce((x,s)=>x+setStim(s),0);
    });
  });
  return Object.values(agg);
}
// Stimulus-to-fatigue ratio: localized stimulus per unit of systemic fatigue cost.
// avg proximity-to-failure ÷ how much of the body the lift taxes (extra muscles + axial spinal load).
function sfrScore(a){
  const ex=a.ex||{},sec=(ex.s||[]).length,prim=Math.max(1,(ex.p||[]).length);
  const axial=/squat|deadlift|clean|snatch|good ?morning|thruster/i.test(a.name)?0.7:0;
  const systemic=1+0.16*sec+0.22*(prim-1)+axial;
  return (a.stim/Math.max(1,a.sets))/systemic;
}
function scienceLabCard(){

    if(s<=0)return;
    if(s<lm.mev)below++;
    else if(s<=lm.mrv)growth++;

/* ===== COMBAT RATING (#2, adapted) =====
   Per-exercise rank tuned by MOVEMENT so machines, cables and isolation rank fairly —
   not punished against a single barbell bodyweight-ratio. Each lift earns
   Street → Vigilante → Dark Knight → Legend, and they roll into the overall Fighter Rank. */
const CR_RANKS=[["STREET","#9aa0ab","👊"],["VIGILANTE","#7FC8FF","🌃"],["DARK KNIGHT","#E8C56A","🦇"],["LEGEND","#F0524A","🔱"]];

function combatStd(ex){
  const prim=MM_NORM((ex.p&&ex.p[0])||"chest");
  let dk=CR_BASE[prim]||1.0;
  const eq=(ex.eq||"").toLowerCase();
  dk*=(CR_EQUIP[eq]!=null?CR_EQUIP[eq]:1.0);
  if(ex.bw)dk+=1.0;                              // bodyweight is baked into the e1RM

}
function combatRank(ratio,std){return ratio>=std.legend?3:ratio>=std.dk?2:ratio>=std.vig?1:0;}

function stalenessReport(){

  state.data.workouts.slice().reverse().forEach(w=>{if(new Date(w.date).getTime()<cut)return;(w.exercises||[]).forEach(e=>{const ex=exFor(e.name);let best=0;(e.sets||[]).forEach(s=>{if(s.done&&s.type!=="W"){const o=setE1RM(ex,s);if(o>best)best=o;}});if(best>0)(byName[e.name]=byName[e.name]||[]).push(best);});});

  return out;
}
function muscleBalance(){

  return {push,pull,quad,ham,flags};
}

const BELT_TIERS=[[2.4,"Undisputed Champion","🏆","#F7DD93"],[1.9,"World Champion","🥇","#EBC76B"],[1.45,"Title Holder","🥈","#9fb0c4"],[1.0,"#1 Contender","🥉","#c8915a"],[0,"Prospect","🎖️","#8b8b8b"]];

function titleBeltsCard(){

/* ===== VILLAIN CAMPAIGN (#5) =====

function villainCampaignCard(){
  const d=state.data;const sl=strengthLevel();
  const wins=new Set((d.bossWins||[]).map(b=>b.villain));
  const list=BOSSES.slice().sort((a,b)=>a.min-b.min);
  let curIdx=list.findIndex(b=>sl>=b.min&&!wins.has(b.v));
  if(curIdx<0)curIdx=list.findIndex(b=>!wins.has(b.v));
  const defeated=list.filter(b=>wins.has(b.v)).length;
  const rows=list.map((b,i)=>{
    const done=wins.has(b.v),unlocked=sl>=b.min,cur=i===curIdx;
    const cls=done?'done':cur?'cur':unlocked?'':'lock';

    else right=`<div class="mini" style="color:var(--text3)">🔒 Locked · reach Lv ${b.min}</div>`;
    return `<div class="vrow">
      <div class="vmed ${cls}" style="--bc:${b.c}">${b.e}${done?'<span class="vchk">✓</span>':''}</div>

  // try the last-known-good model first, then the rest of the chain
  const order=[gemModel(),...GEM_MODELS.filter(m=>m!==gemModel())];
  let lastErr="";

      return (j.candidates?.[0]?.content?.parts?.[0]?.text)||"";

    if(r.status===404||/not found|not supported|deprecated|retired/i.test(msg)){lastErr="model "+model+" unavailable"; continue;}

    if(r.status===400&&/api key not valid|invalid/i.test(msg))throw new Error("That Gemini key isn't valid. Re-check it in Settings (free key at aistudio.google.com/apikey).");

/* ---- Muscle Priority (controls how fast a district breeds crime) ---- */
const PRIORITIES=[

  {k:"standard",n:"Standard",e:"🟠",target:6,desc:"Regular rotation"},

function prioDef(k){return PRIORITIES.find(p=>p.k===k)||PRIORITIES[1];}
function musclePrio(m){return (state.data.musclePriority&&state.data.musclePriority[m])||"standard";}
function setMusclePrio(m,k){state.data.musclePriority=state.data.musclePriority||{};state.data.musclePriority[m]=k;save();haptic("tap");}
function cycleMusclePrio(m){const order=PRIORITIES.map(p=>p.k);const cur=order.indexOf(musclePrio(m));setMusclePrio(m,order[(cur+1)%order.length]);openDistricts();}

/* ---- District Control ---- */
const MUSCLE_DISTRICT={chest:"The Narrows",back:"Bristol Docks",shoulders:"Burnley Heights",biceps:"Otisburg",triceps:"Coventry",forearms:"The Cauldron",quads:"Robinson Park",hamstrings:"Park Row",glutes:"Amusement Mile",calves:"Tricorner Yards",abs:"Old Gotham",traps:"Diamond District"};
function daysSinceMuscle(m){const t=state.data.muscleLastTrained&&state.data.muscleLastTrained[m];if(!t)return null;return (now()-t)/864e5;}
function districtCrime(m){
  const trained=(state.data.muscleVol[m]||0)>0;const ds=daysSinceMuscle(m);
  if(!trained||ds==null)return {crime:85,ds:null,untrained:true};

function districtBand(c){return c<20?["SECURED","var(--green)"]:c<45?["PATROLLED","var(--gold2)"]:c<70?["RISING","var(--orange)"]:c<90?["CONTESTED","var(--red)"]:["OVERRUN","#ff3b30"];}

function tempoDefaults(){return {ecc:3,pb:1,con:1,pt:0};}
function tempoSlider(k,label,v,min,max){return `<div class="row sp" style="margin-top:7px"><span class="mini">${label}</span><span class="mini" id="tempo-${k}-v" style="color:var(--gold2)">${v}s</span></div><input type="range" min="${min}" max="${max}" step="1" value="${v}" oninput="setTempo('${k}',this.value)" style="width:100%;accent-color:var(--gold2)">`;}
function setTempo(k,v){state._tempo=state._tempo||tempoDefaults();state._tempo[k]=parseInt(v);const el=$("tempo-"+k+"-v");if(el)el.textContent=v+"s";const t=state._tempo;const c=$("tempo-count");if(c)c.textContent=`${t.ecc}-${t.pb}-${t.con}-${t.pt}`;}

  openOverlay();$("ovcard").innerHTML=`<div class="row sp"><div class="ttl" style="margin:0">⏱️ Tempo Trainer</div><button class="btn ghost sm" style="width:auto" onclick="stopTempo();closeOverlay()">✕</button></div>
    <div class="mini" style="color:var(--text2);margin:2px 0 4px">Own the eccentric. Set a cadence, follow the orb, and every rep earns its keep.</div>

    <button class="btn gold" id="tempo-btn" style="margin-top:12px" onclick="toggleTempo()">▶ Start cadence</button>`;
}
function toggleTempo(){if(state._tempoInt){stopTempo();return;}startTempo();}
function startTempo(){
  const t=state._tempo||tempoDefaults();
  const phases=[["DOWN",t.ecc,0.55],["HOLD",t.pb,0.55],["UP",t.con,1],["HOLD",t.pt,1]].filter(p=>p[1]>0);
  if(!phases.length)return;
  let pi=0,sec=0;const btn=$("tempo-btn");if(btn)btn.textContent="⏸ Stop";
  const apply=()=>{const ph=phases[pi];const dot=$("tempo-dot"),lab=$("tempo-phase");if(dot)dot.style.transform=`scale(${ph[2]})`;if(lab)lab.textContent=ph[0];beep(ph[0]==="UP"?740:ph[0]==="DOWN"?440:560);haptic("tap");};
  apply();
  state._tempoInt=setInterval(()=>{sec++;if(sec>=phases[pi][1]){sec=0;pi=(pi+1)%phases.length;apply();}},1000);
}
function stopTempo(){if(state._tempoInt){clearInterval(state._tempoInt);state._tempoInt=null;}const btn=$("tempo-btn");if(btn)btn.textContent="▶ Start cadence";const lab=$("tempo-phase");if(lab)lab.textContent="READY";const dot=$("tempo-dot");if(dot)dot.style.transform="scale(1)";}

function dayVolMap(){
  const map={};
  (state.data.workouts||[]).forEach(w=>{const k=new Date(w.date).toISOString().slice(0,10);map[k]=(map[k]||0)+(w.totalVol||0);});
  return map;
}
function patrolCalendar(){
  const map=dayVolMap();const vals=Object.values(map).filter(v=>v>0);
  const max=vals.length?Math.max(...vals):1;
  const today=new Date();today.setHours(0,0,0,0);
  // align to the most recent Sunday so columns are clean weeks
  const end=new Date(today);end.setDate(end.getDate()+(6-end.getDay()));
  const weeks=26,cells=weeks*7;
  let cols="";
  for(let w=weeks-1;w>=0;w--){
    let col="";
    for(let dow=0;dow<7;dow++){
      const dt=new Date(end);dt.setDate(end.getDate()-(w*7)+(dow-6));
      const k=dt.toISOString().slice(0,10);const v=map[k]||0;
      const future=dt>today;
      let bg="rgba(255,255,255,.04)";
      if(future)bg="transparent";
      else if(v>0){const t=Math.min(1,v/max);const a=(0.25+t*0.75).toFixed(2);bg=`rgba(235,199,107,${a})`;}
      col+=`<div title="${k}${v?` · ${fmtNum(Math.round(v))}kg`:''}" style="width:9px;height:9px;border-radius:2px;background:${bg}"></div>`;
    }
    cols+=`<div style="display:flex;flex-direction:column;gap:3px">${col}</div>`;
  }
  return `<div style="overflow-x:auto"><div style="display:flex;gap:3px;min-width:max-content">${cols}</div></div>
    <div class="row sp" style="margin-top:8px"><span class="mini" style="color:var(--text3)">${vals.length} active days</span>

/* ---- Strength Simulator ---- */
function simCompute(){
  const s=state._sim||{sessions:4,weeks:12,intensity:1};
  // crude evidence-flavoured model: weekly strength gain % scales with sessions/wk & intensity,
  // with diminishing returns by training age.
  const ta=trainingAge();const yrs=ta?ta.days/365:0;
  const ageMult=clamp(1-yrs*0.18,0.3,1);                 // novices gain faster
  const base=0.9;                                         // % per week at 4 sessions, normal intensity
  const weekly=base*(s.sessions/4)*s.intensity*ageMult;  // % per week
  const total=Math.round((Math.pow(1+weekly/100,s.weeks)-1)*100);
  const lvl=strengthLevel();const projLvl=Math.round(lvl*(1+total/100));
  // project top lift
  const names=loggedExerciseNames();let liftLine="";
  if(names.length){const rows=exerciseRows(names[0]);if(rows.length){const cur=rows[rows.length-1].e1rm;const p=Math.round(cur*(1+total/100));liftLine=`<div class="mini" style="color:var(--text2);margin-top:6px">${esc(names[0])}: <b style="color:var(--text3)">${cur}kg</b> → <b style="color:#2ECC71">${p}kg</b></div>`;}}
  return {weekly:weekly.toFixed(2),total,lvl,projLvl,liftLine};
}
function setSim(k,v){state._sim=state._sim||{sessions:4,weeks:12,intensity:1};state._sim[k]=parseFloat(v);drawSim();}

    <div class="row sp" style="padding:6px 0;border-top:1px solid var(--border)"><span class="mini">Strength level</span><span class="mini"><b style="color:var(--text3)">${r.lvl}</b> → <b style="color:#2ECC71">${r.projLvl}</b></span></div>
    <div class="row sp" style="padding:6px 0;border-top:1px solid var(--border)"><span class="mini">Weekly rate</span><span class="mini"><b style="color:var(--gold2)">${r.weekly}%/wk</b></span></div>

}

/* ---- Batcomputer Terminal: command-line data console ---- */
function termRespond(cmd){
  const d=state.data,u=d.u,c=(cmd||"").trim().toLowerCase();
  if(!c)return "";
  if(c==="help"||c==="?")return "COMMANDS:\\n  status   — overview\\n  volume   — weekly tonnage\\n  weak     — weakest muscle\\n  prs      — recent personal records\\n  rank     — current rank & level\\n  villains — bosses defeated\\n  streak   — current streak\\n  clear    — wipe the console";
  if(c==="status")return `OPERATIVE STATUS\\n  Workouts: ${u.totalWorkouts}\\n  Volume:   ${fmtNum(Math.round(u.totalVolume))}kg lifetime\\n  Streak:   ${u.streakDays} days\\n  Rank:     ${rankFor(strengthLevel()).name}`;
  if(c==="volume")return `WEEKLY TONNAGE\\n  Avg/week: ${fmtNum(Math.round(avgWeekVol()))}kg\\n  Lifetime: ${fmtNum(Math.round(u.totalVolume))}kg`;
  if(c==="weak"){const m=weakestMuscle();return m?`WEAKEST LINK\\n  ${MNAME[m]} — level ${muscleLevel(m)}\\n  Prioritise it next session.`:"Not enough data — train more muscles.";}
  if(c==="prs"){const prs=Object.entries(d.prs).slice(-6);return prs.length?"RECENT PRs\\n"+prs.map(([k,p])=>`  ${k}: ${Math.round(p.orm||0)}kg`).join("\\n"):"No PRs logged yet.";}
  if(c==="rank"){const l=strengthLevel(),r=rankFor(l);return `RANK\\n  ${r.emoji} ${r.name}\\n  Strength level ${l}`;}
  if(c==="villains"){const b=d.bossWins||[];return b.length?`VILLAINS FELLED: ${b.length}\\n`+b.slice(-5).map(x=>`  ${x.name||x.boss||"Unknown"}`).join("\\n"):"No villains defeated yet.";}
  if(c==="streak")return `STREAK\\n  Current: ${u.streakDays} days\\n  Keep the patrol unbroken.`;
  if(c==="clear"){state._term=[];return "__CLEAR__";}
  return `Unknown command: "${esc(c)}"\\n  Type 'help' for the list.`;
}
function runTerminal(){
  const inp=$("term-in");if(!inp)return;const cmd=inp.value;if(!cmd.trim())return;
  state._term=state._term||[];
  const res=termRespond(cmd);
  if(res==="__CLEAR__"){state._term=[];}
  else state._term.push({cmd,res});
  inp.value="";haptic("tap");drawTerminal();
}
function drawTerminal(){
  const log=state._term||[];const el=$("term-log");if(!el)return;
  el.innerHTML=log.map(e=>`<div style="margin-bottom:9px"><div style="color:var(--gold2)">› ${esc(e.cmd)}</div><div style="color:#9fe6b0;white-space:pre-wrap;line-height:1.45">${esc(e.res)}</div></div>`).join("")||`<div style="color:var(--text3)">Type a command and press Run. Start with <b style="color:var(--gold2)">help</b>.</div>`;
  el.scrollTop=el.scrollHeight;
}
function openTerminal(){

      <p class="muted" style="font-size:12.5px;margin:0">Add a free Google Gemini key in Settings for live chat — text Alfred or attach a 📎 physique photo and ask him to critique it. The briefing below always works without it.</p></div></div>
      <button class="btn gold sm" style="margin-top:11px" onclick="openSettings()">Activate live chat</button></div>`;
  }
  // ===== then the always-on local coaching =====
  html+=alfredBriefing();
  html+=storyCampaignCard();
  html+=alfredCaveReview();
  html+=alfredDebrief();
  html+=`<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:12px;border-color:var(--gold-dim)" onclick="go('fuel')"><div style="font-size:30px">🍽️</div><div style="flex:1"><div class="ttl" style="margin:0">Fuel &amp; nutrition</div><div class="mini" style="color:var(--text2)">Calories, macros, water, supplements &amp; weigh-ins live in the <b style="color:var(--gold2)">FUEL</b> tab — top bar 🍽️.</div></div><span style="color:var(--gold2);font-size:20px">›</span></div>`;
  html+=fightRecordCard();
  html+=alfredMusclePicker();
  $("app").innerHTML=html;
}
function alfredQuick(){const i=$("alfred-in");if(i)i.focus();}
async function sendAlfred(){
  const inp=$("alfred-in");const pic=ALFRED_PIC;const q=inp.value.trim();
  if(!q&&!pic)return;
  inp.value="";ALFRED_PIC=null;
  ALFRED_MSGS.push({role:"user",text:q||(pic?"What do you make of this physique, Alfred?":""),img:pic?pic.url:null});
  ALFRED_MSGS.push({role:"alfred",text:"…thinking…"});renderAlfred();
  try{
    const parts=[];
    if(pic){
      parts.push({text:alfredContext()+"\n\nThe user has attached a physique photo. As Alfred — a sharp, witty British butler and elite sports scientist — give an honest, encouraging critique: standout strong points, the 2-3 weakest areas to bring up, symmetry/proportion notes, and one concrete training focus. Be specific and motivating, never clinical or robotic. "+(q?("User's question: "+q):"")});
      parts.push({inline_data:{mime_type:pic.mime,data:pic.b64}});
    }else{
      parts.push({text:alfredContext()+"\n\nUser asks: "+q});
    }
    const txt=await geminiCall(parts);
    ALFRED_MSGS[ALFRED_MSGS.length-1].text=txt||"I have nothing to add, sir.";state.data.u.aiUses++;checkAchievements();save();}
  catch(e){ALFRED_MSGS[ALFRED_MSGS.length-1].text="I'm afraid the line to the Batcomputer is down, sir. ("+e.message+")";}
  renderAlfred();
}

/* ========================= SETTINGS ========================= */
function openSettings(){
  const u=state.data.u;
  openOverlay();$("ovcard").innerHTML=`<div class="ttl">⚙︎ Settings</div>
    <label class="mini">Name</label><input value="${esc(u.name)}" oninput="u_set('name',this.value)" style="margin-bottom:8px"/>
    <label class="mini">Bodyweight (kg)</label><input inputmode="decimal" value="${u.bodyweight}" oninput="u_set('bodyweight',parseFloat(this.value)||75)" style="margin-bottom:8px"/>
    <label class="mini">Weekly goal</label><input inputmode="numeric" value="${u.weeklyGoal}" oninput="u_set('weeklyGoal',parseInt(this.value)||4)" style="margin-bottom:8px"/>
    <label class="mini">Rest timer (sec)</label><input inputmode="numeric" value="${u.restTime}" oninput="u_set('restTime',parseInt(this.value)||120)" style="margin-bottom:8px"/>
    <label class="mini">Bar weight (kg)</label><input inputmode="decimal" value="${u.barWeight}" oninput="u_set('barWeight',parseFloat(this.value)||20)" style="margin-bottom:12px"/>
    <label class="mini">Autoregulation metric</label>
    <div class="row" style="gap:8px;margin-bottom:12px"><button class="chip ${u.metric==='rpe'?'on':''} g" onclick="u_set('metric','rpe');openSettings()">RPE</button><button class="chip ${u.metric==='rir'?'on':''} g" onclick="u_set('metric','rir');openSettings()">RIR</button></div>
    <label class="mini">Alfred's voice (speaks after each set)</label>
    <div class="row" style="gap:8px;margin-bottom:6px"><button class="chip ${u.coachVoice?'on':''} g" onclick="u_set('coachVoice',true);openSettings()">On</button><button class="chip ${!u.coachVoice?'on':''} g" onclick="u_set('coachVoice',false);openSettings()">Off</button></div>
    <select onchange="u_set('coachVoiceName',this.value);openSettings()" style="margin-bottom:6px">${alfredVoiceOptions()}</select>
    <button class="btn ghost sm" style="margin-bottom:6px" onclick="previewAlfredVoice()">🔊 Preview Alfred's voice</button>
    <div class="mini" style="color:var(--text3);margin-bottom:12px;line-height:1.45">For a richer butler voice on iPhone: Settings → Accessibility → Spoken Content → Voices → English → download <b>Arthur</b> or <b>Daniel (Enhanced)</b>, then pick it above.</div>
    <label class="mini">Gemini 1.5 Flash API key (stored on this device only)</label>
    <input value="${esc(geminiKey())}" placeholder="Paste key to activate Alfred" oninput="setGemKey(this.value)" style="margin-bottom:14px"/>
    <div class="hr"></div>
    <button class="btn ghost sm" style="margin-bottom:8px" onclick="exportRival()">👥 Generate sparring code</button>
    <button class="btn ghost sm" style="margin-bottom:8px" onclick="importRival()">📥 Import a rival</button>
    <button class="btn ghost sm" style="margin-bottom:8px" onclick="backupData()">💾 Backup data (JSON)</button>
    <button class="btn ghost sm" style="margin-bottom:8px" onclick="restoreData()">📂 Restore data</button>
    <button class="btn ghost sm" style="margin-bottom:8px" onclick="exportCSV()">📊 Export workouts (CSV)</button>
    <button class="btn ghost sm" style="margin-bottom:8px" onclick="state.showOnboarding=true;state.obStep=0;state.obTmp={};closeOverlay();render()">Edit hero profile</button>
    <button class="btn danger" onclick="wipeData()">Wipe everything</button>
    <button class="btn" style="margin-top:10px" onclick="closeOverlay();render()">Done</button>`;
}
function u_set(k,v){state.data.u[k]=v;save();}
function setGemKey(v){if(v.trim())localStorage.setItem("gt_gemini",v.trim());else localStorage.removeItem("gt_gemini");state.data.u.aiKeySet=!!v.trim();save();}
function exportRival(){const d=state.data;const code=btoa(unescape(encodeURIComponent(JSON.stringify({name:d.u.name||"Vigilante",totalVol:d.u.totalVolume,totalWorkouts:d.u.totalWorkouts,streak:d.u.streakDays,prs:d.prs}))));
  if(navigator.clipboard)navigator.clipboard.writeText(code);appAlert({title:"Sparring code",ok:"Done",html:`Copied to your clipboard. Send this to a rival:<input readonly value="${esc(code)}" style="margin-top:10px" onclick="this.select()"/>`});}
function importRival(){appPrompt({title:"Add rival",body:"Paste a rival's sparring code:",ok:"Spar"}).then(c=>{if(!c)return;try{const clean=(c||"").replace(/\s+/g,"");const r=JSON.parse(decodeURIComponent(escape(atob(clean))));if(!r||typeof r!=="object"){toast("Invalid code.");return;}state.data.rival=r;save();checkAchievements();toast("Now sparring with "+(r.name||"your rival"));closeOverlay();render();}catch(e){toast("Invalid code.");}});}
function backupData(){const blob=new Blob([JSON.stringify(state.data)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gainstracker-backup.json";a.click();}
function exportCSV(){
  const rows=[["date","exercise","set","weight_kg","reps","type","est_1rm_kg"]];
  (state.data.workouts||[]).slice().reverse().forEach(w=>{
    const d=(w.date||"").slice(0,10);
    (w.exercises||[]).forEach(e=>{
      (e.sets||[]).forEach((s,i)=>{
        const ex=exFor(e.name);let e1="";try{e1=setE1RM(ex,s);}catch(err){}
        rows.push([d,e.name,i+1,s.w||"",s.r||"",s.type||"NRM",e1?Math.round(e1):""]);
      });
    });
  });
  if(rows.length<2){toast("No workouts to export yet.");return;}
  const csv=rows.map(r=>r.map(c=>{c=String(c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gainstracker-workouts.csv";a.click();toast("Exported "+(rows.length-1)+" sets to CSV.");
}
function restoreData(){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=()=>{const f=i.files[0];const r=new FileReader();r.onload=()=>{try{state.data=Object.assign(blankData(),JSON.parse(r.result));save();toast("Data restored.");closeOverlay();render();}catch(e){toast("Bad file.");}};r.readAsText(f);};i.click();}
function wipeData(){appConfirm({title:"Erase everything",body:"This permanently deletes ALL your data — workouts, PRs, splits, progress. It cannot be undone.",ok:"Erase all",cancel:"Keep my data",danger:true}).then(ok=>{if(!ok)return;localStorage.removeItem("gt_data");state.data=blankData();save();state.showOnboarding=true;state.obStep=0;closeOverlay();render();});}

/* ========================= VILLAIN TAUNT (missed training day) ========================= */
function checkVillainTaunt(){
  const y=new Date();y.setDate(y.getDate()-1);const di=(y.getDay()+6)%7;
  const wasTraining=state.data.u.weekSchedule[di]!==false;
  const trained=state.data.workouts.some(w=>new Date(w.date).toDateString()===y.toDateString());
  if(wasTraining&&!trained&&state.data.u.totalWorkouts>0&&!state.data.dismissed["taunt"+y.toDateString()]){
    const taunts={chest:["Bane","You skipped. I didn't."],quads:["Penguin","I don't skip leg day either. Look at me."],back:["Riddler","What has a spine but never uses it?"],shoulders:["Scarecrow","Fear is letting another day pass."]};
    const m=state.data.u.lastMissedMuscle;const t=taunts[m]||["Gotham","The Bat noticed. Gotham noticed. Your muscles noticed."];
    setTimeout(()=>{openOverlay();$("ovcard").innerHTML=`<div class="center"><div class="bossemoji">😈</div><div class="bossname">${esc(t[0])}</div><div class="bossquote">"${esc(t[1])}"</div><button class="btn gold" onclick="state.data.dismissed['taunt${y.toDateString()}']=true;save();closeOverlay()">I'LL MAKE UP FOR IT</button></div>`;},900);
  }
}

/* picker dual-use: session add OR split-day add */
function pickAdd(name){
  if(state.pickerMulti){
    const s=state.data.splits.find(x=>x.id===state.pickerMulti.id);
    if(s&&s.days[state.pickerMulti.i]){const arr=s.days[state.pickerMulti.i].exercises;const idx=arr.indexOf(name);
      if(idx>=0){arr.splice(idx,1);haptic("tap");}else{arr.push(name);haptic("light");}
      save();updateExList();}                  // refresh in place — sheet stays open, scroll preserved
    return;
  }
  if(state.pickerCb){const cb=state.pickerCb;state.pickerCb=null;cb(name);return;}
  addExerciseToSession(name);
}

/* ========================= ONBOARDING ========================= */
function renderOnboarding(){
  const s=state.obStep,t=state.obTmp;
  let html='<div class="fade" style="padding-top:18px">';
  const dots=`<div class="ob-dots">${[0,1,2].map(i=>`<i class="${i===s?'on':''}"></i>`).join("")}</div>`;
  if(s===0){
    html+=`<div class="center"><img class="brandlogo" src="logo_t.png" alt=""></div>
    <h1 style="font-size:38px;text-align:center;color:var(--gold2);margin:10px 0 4px">GOTHAM NEEDS A HERO</h1>
    <p class="muted center" style="font-size:13px;margin:0 0 14px">Forge the discipline. Become the weapon.</p>
    ${dots}
    <div class="card"><label class="mini">Your name</label><input id="ob-name" value="${esc(t.name||'')}" placeholder="Bruce…" oninput="state.obTmp.name=this.value" style="margin-bottom:10px"/>
    <label class="mini">Bodyweight (kg)</label><input id="ob-bw" inputmode="decimal" value="${t.bw||''}" placeholder="85" oninput="state.obTmp.bw=parseFloat(this.value)" style="margin-bottom:10px"/>
    <label class="mini">Natty or enhanced? (just for Alfred's humour)</label>
    <div class="row" style="gap:6px;margin-bottom:4px">${["natty","maybe","enhanced"].map(o=>`<button class="chip ${(t.natty||'maybe')===o?'on':''} g" onclick="state.obTmp.natty='${o}';renderOnboarding()">${o==='natty'?'Natty':o==='maybe'?"Won't say":'Enhanced'}</button>`).join("")}</div></div>
    <div class="ttl">Choose your goal</div>
    ${[["build","🔥 BUILD","Pure muscle. Volume is the weapon."],["cut","⚡ CUT","Shred. Precision over power."],["recomp","⚖️ RECOMP","Build and cut. The hardest path."]].map(g=>`<div class="goal-card ${t.goal===g[0]?'on':''}" onclick="state.obTmp.goal='${g[0]}';renderOnboarding()"><div class="gt">${g[1]}</div><div class="mini">${g[2]}</div></div>`).join("")}
    <button class="btn gold" onclick="obNext()">Continue →</button>`;
  }else if(s===1){
    html+=`<h1 style="font-size:38px;text-align:center;color:var(--gold2);margin:6px 0 6px">HOW LONG IN THE SHADOWS?</h1>
    ${dots}
    <div class="card" style="margin-bottom:12px;text-align:center"><b class="gold">Welcome to Gotham — your journey starts here at Level 1.</b><div class="mini" style="margin-top:4px">Your experience doesn't inflate your level. It only tells Alfred how to coach you (volume, MEV, recovery).</div></div>
    ${[["RECRUIT","🌱 RECRUIT","Under 1 year"],["VIGILANTE","🦇 VIGILANTE","1–3 years"],["DARK_KNIGHT","🔱 DARK KNIGHT","3+ years"]].map(e=>`<div class="goal-card ${t.exp===e[0]?'on':''}" onclick="state.obTmp.exp='${e[0]}';renderOnboarding()"><div class="gt">${e[1]}</div><div class="mini">${e[2]}</div></div>`).join("")}
    <button class="btn gold" onclick="obNext()" ${t.exp?'':'disabled style="opacity:.4"'}>Continue →</button>
    <button class="btn ghost" style="margin-top:8px" onclick="state.obStep=0;renderOnboarding()">← Back</button>`;
  }else if(s===2){
    html+=`<h1 style="font-size:38px;text-align:center;color:var(--gold2);margin:6px 0 14px">THE CAVE IS READY</h1>
    ${dots}
    <div class="card center"><div style="font-size:42px">🦇</div>
    <p class="muted" style="font-size:13.5px;margin:8px 0;line-height:1.6">Everyone starts at <b class="gold">Level 1</b> with a clean slate. Your experience level only tells Alfred how to coach you — volume, recovery, weak points.</p>
    <p class="mini" style="color:var(--text3)">Train, log, and Gotham will watch you rise.</p></div>
    <button class="btn gold" onclick="obFinish()">Enter Gotham →</button>
    <button class="btn ghost" style="margin-top:8px" onclick="state.obStep=1;renderOnboarding()">← Back</button>`;
  }
  html+='</div>';
  $("app").innerHTML=html;
}
function obNext(){
  const t=state.obTmp;
  if(state.obStep===0){if(!t.goal){toast("Pick a goal.");return;}state.data.u.name=t.name||"";state.data.u.bodyweight=t.bw||75;state.data.u.natty=t.natty||"maybe";state.data.u.goal=t.goal;state.obStep=1;renderOnboarding();}
  else if(state.obStep===1){if(!t.exp){toast("Pick experience.");return;}
    // Feature 7: experience is CONTEXT ONLY for Alfred — it never inflates your level.
    // Everyone starts at Level 1 with zero accumulated volume.
    state.data.experienceLevel=t.exp;state.obStep=2;renderOnboarding();}
}
function obFinish(){
  state.data.onboardingDone=true;save();state.showOnboarding=false;
  // splash
  $("app").innerHTML=`<div class="splash"><img class="brandlogo splash" src="logo_t.png" alt=""><h1 style="font-size:30px;color:var(--gold2);text-align:center">Welcome to Gotham,<br/>${esc(state.data.u.name||"hero")}.</h1></div>`;
  $("nav").classList.add("hide");
  setTimeout(()=>{state.tab="gotham";render();},2200);
}

/* ========================= BOOT ========================= */
function boot(){
  load();
  if(!state.data.splits||!state.data.splits.length){state.data.splits=defaultSplits();state.data.activeSplitId="ppl";}
  // migrate plates
  if(!state.data.plates||!state.data.plates.length)state.data.plates=DEF_PLATES.slice();
  loadExDB();
  if(!state.data.onboardingDone){state.showOnboarding=true;state.obStep=0;state.obTmp={};}
  else{state.tab="gotham";}  // The Cave auto-home: always land on the glanceable Cowl dashboard, never the last-used tab
  render();
  if(state.data.onboardingDone){checkVillainTaunt();checkUnlocks();/* silent baseline on first run so only NEW unlocks notify later */}
  // service worker
  if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
  // offline indicator: reflects real connectivity, reassures data is local
  const offUI=()=>{const p=$("offline-pill");if(p)p.classList.toggle("on",!navigator.onLine);};
  window.addEventListener("online",offUI);window.addEventListener("offline",offUI);offUI();
  // Glass press ripple — adds a tactile light burst on every tappable surface
  document.addEventListener("pointerdown",e=>{
    const t=e.target.closest(".btn,.chip,.sdone,.exrow,#nav button,.stype");
    if(!t||t.disabled)return;
    const r=t.getBoundingClientRect();const d=Math.max(r.width,r.height);
    const s=document.createElement("span");s.className="ripple";
    s.style.width=s.style.height=d+"px";
    s.style.left=(e.clientX-r.left-d/2)+"px";s.style.top=(e.clientY-r.top-d/2)+"px";
    t.appendChild(s);setTimeout(()=>s.remove(),600);
  },{passive:true});
}
boot();

</script>
